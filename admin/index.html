<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容管理 · 千里同風</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #faf9f7; --paper: #fff; --border: #e8e2da;
      --text: #1f1c17; --text2: #6b6359; --text3: #9ca3af;
      --accent: #2563eb; --green: #10b981; --red: #ef4444;
    }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Firebase login ── */
    #fb-login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .fb-input {
      display: block; width: 100%; padding: 11px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .15s; margin-bottom: 10px; background: var(--paper);
    }
    .fb-input:focus { border-color: var(--accent); }
    .fb-err { font-size: 13px; color: var(--red); min-height: 18px; margin-bottom: 10px; }

    /* ── Login card（Firebase 登录用） ── */
    .login-card {
      background: var(--paper); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; max-width: 420px; width: 100%; text-align: center;
    }
    .login-logo { font-size: 28px; font-weight: 700; letter-spacing: .1em; margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text3); margin-bottom: 32px; }
    .btn-primary {
      display: block; width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-family: inherit;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: default; }

    /* ── Editor ── */
    #editor { display: none; }
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: var(--paper); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .top-bar__title { font-weight: 500; font-size: 15px; }
    .top-bar__right { display: flex; align-items: center; gap: 10px; }
    .top-bar__left { display: flex; align-items: center; gap: 18px; }
    .top-bar__logo { font-weight: 700; letter-spacing: .08em; color: var(--text); text-decoration: none; }
    .top-bar__nav { display: flex; gap: 14px; font-size: 13px; }
    .top-bar__nav-current { color: var(--accent); border-bottom: 2px solid var(--accent); padding: 4px 0; }
    .top-bar__nav-soon { color: var(--text3); cursor: default; }
    .top-bar__nav-link { color: var(--text2); text-decoration: none; }
    .top-bar__nav-link:hover { color: var(--text); }
    .status { font-size: 12px; color: var(--text3); }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
    .btn-save {
      padding: 8px 20px; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-save:hover { opacity: .88; }
    .btn-save:disabled { opacity: .5; cursor: default; }
    .btn-link { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; }
    .btn-link:hover { color: var(--red); }

    /* ── Page switcher ── */
    .page-bar {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      padding: 0 24px; background: var(--paper);
    }
    .page-btn {
      padding: 12px 18px; font-size: 13px; font-family: inherit; background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer; color: var(--text3);
      transition: color .15s, border-color .15s;
    }
    .page-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .page-btn:hover:not(.active) { color: var(--text2); }

    /* ── Pending changes bar ── */
    .changes-bar {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 24px; background: #eef2ff; border-bottom: 1px solid var(--border);
      font-size: 13px; color: var(--text2);
    }
    .btn-sync {
      padding: 6px 14px; background: var(--accent); color: #fff; border: none;
      border-radius: 7px; font-size: 12px; font-family: inherit; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-sync:hover { opacity: .88; }
    .btn-sync:disabled { opacity: .5; cursor: default; }

    /* ── Preview iframe ── */
    #preview-frame {
      width: 100%; height: calc(100vh - 101px); border: none; display: block; background: #fff;
    }

    /* ── Top-bar view tabs（网站内容 / Blog）── */
    .top-bar__nav-btn {
      background: none; border: none; font: inherit; cursor: pointer; padding: 0 0 2px;
      color: var(--text3); border-bottom: 2px solid transparent;
    }
    .top-bar__nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .top-bar__nav-btn:hover:not(.active) { color: var(--text2); }

    /* ── Blog view ── */
    .blog-toolbar { padding: 16px 24px; }
    .blog-list-row {
      display: flex; align-items: center; gap: 14px; padding: 12px 24px;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .blog-list-date { color: var(--text3); width: 90px; flex-shrink: 0; }
    .blog-list-title { flex: 1; }

    #blog-compose { max-width: 720px; margin: 0 auto; padding: 24px; }
    .compose-row { margin-bottom: 16px; }
    .compose-label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 5px; }
    .compose-input, .compose-textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; font-family: inherit; background: var(--paper); color: var(--text);
      outline: none; resize: vertical;
    }
    .compose-input:focus, .compose-textarea:focus { border-color: var(--accent); }
    .compose-textarea { line-height: 1.7; }
    .compose-toolbar { margin-bottom: 6px; display: flex; gap: 6px; }
    .compose-toolbar button {
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px;
      background: var(--paper); font-size: 12px; cursor: pointer;
    }
    .compose-cover-preview {
      max-width: 200px; border-radius: 6px; margin-top: 8px; display: none;
    }
    .lang-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- ══ Firebase Login ════════════════════════════════════════════════ -->
<div id="fb-login">
  <div class="login-card">
    <div class="login-logo">千里同風</div>
    <div class="login-sub">管理员登录</div>
    <input id="fb-email" type="email" class="fb-input" placeholder="邮箱地址" autocomplete="email">
    <input id="fb-password" type="password" class="fb-input" placeholder="密码" autocomplete="current-password">
    <div id="fb-err" class="fb-err"></div>
    <button type="button" class="btn-primary" id="fb-login-btn" onclick="fbLogin()">登录</button>
  </div>
</div>

<!-- ══ Editor ═════════════════════════════════════════════════════════ -->
<div id="editor">
  <div class="top-bar">
    <div class="top-bar__left">
      <a href="/" class="top-bar__logo" title="返回网站主页">千里同風</a>
      <nav class="top-bar__nav">
        <button type="button" class="top-bar__nav-btn active" id="nav-content" onclick="switchAdminView('content')">网站内容</button>
        <button type="button" class="top-bar__nav-btn" id="nav-blog" onclick="switchAdminView('blog')">Blog</button>
        <a href="/solutions/demo/admin.html" class="top-bar__nav-link">运行监控</a>
      </nav>
    </div>
    <div class="top-bar__right">
      <span class="status" id="status"></span>
      <button type="button" class="btn-save" id="save-btn" onclick="save()">保存并发布</button>
      <button type="button" class="btn-link" onclick="fbLogout()">退出登录</button>
    </div>
  </div>

  <div id="view-content">
    <div class="page-bar">
      <button type="button" class="page-btn active" data-page="home" onclick="switchPage('home')">首页</button>
      <button type="button" class="page-btn" data-page="about" onclick="switchPage('about')">关于我们</button>
      <button type="button" class="page-btn" data-page="milestones" onclick="switchPage('milestones')">大事记</button>
      <button type="button" class="page-btn" data-page="solutions" onclick="switchPage('solutions')">解决方案</button>
    </div>

    <div class="changes-bar" id="changes-bar" hidden>
      <span id="changes-count">已改 0 处</span>
      <button type="button" class="btn-sync" id="sync-btn" onclick="syncTranslate()">✨ 一键同步日英</button>
    </div>

    <iframe id="preview-frame" title="页面内容预览编辑"></iframe>
  </div>

  <div id="view-blog" hidden>
    <div class="blog-toolbar">
      <button type="button" class="btn-save" onclick="startNewPost()">+ 写新文章</button>
    </div>
    <div id="blog-list"></div>

    <div id="blog-compose" hidden>
      <div class="compose-row">
        <label class="compose-label">标签</label>
        <input type="text" id="compose-tag" class="compose-input" placeholder="如：AI・ハードウェア" oninput="onComposeInput()">
      </div>
      <div class="compose-row">
        <label class="compose-label">封面图（可选）</label>
        <input type="file" id="compose-cover-file" accept="image/*" onchange="handleCoverFile(this.files[0])">
        <img id="compose-cover-preview" class="compose-cover-preview" alt="">
      </div>
      <div class="compose-row">
        <label class="compose-label">标题（中文）</label>
        <input type="text" id="compose-title-zh" class="compose-input" oninput="onComposeInput()">
      </div>
      <div class="compose-row">
        <label class="compose-label">正文（中文，Markdown）</label>
        <div class="compose-toolbar">
          <button type="button" onclick="wrapSelection('**','**')">B 加粗</button>
          <button type="button" onclick="insertLinePrefix('## ')">H 小标题</button>
          <button type="button" onclick="insertLinePrefix('- ')">• 列表</button>
        </div>
        <textarea id="compose-body-zh" class="compose-textarea" rows="14" oninput="onComposeInput()"></textarea>
      </div>
      <div class="compose-row">
        <button type="button" class="btn-sync" id="compose-sync-btn" onclick="syncBlogTranslate()">✨ 一键同步日英</button>
        <span id="compose-sync-status" class="status"></span>
      </div>
      <div class="lang-tabs">
        <button type="button" class="page-btn active" data-other-lang="ja" onclick="switchComposeOtherLang('ja')">日本語</button>
        <button type="button" class="page-btn" data-other-lang="en" onclick="switchComposeOtherLang('en')">English</button>
      </div>
      <div class="compose-row">
        <label class="compose-label" id="other-lang-title-label">标题（日本語）</label>
        <input type="text" id="compose-title-other" class="compose-input" oninput="onComposeInput()">
      </div>
      <div class="compose-row">
        <label class="compose-label" id="other-lang-body-label">正文（日本語）</label>
        <textarea id="compose-body-other" class="compose-textarea" rows="14" oninput="onComposeInput()"></textarea>
      </div>
      <div class="compose-row">
        <button type="button" class="btn-save" onclick="publishPost()">发布</button>
        <button type="button" class="btn-link" onclick="cancelCompose()">取消</button>
        <span id="compose-publish-status" class="status"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── 可编辑页面清单：字段本身不再手工维护，改由 data-i18n 属性自动发现 ── */
const PAGES = {
  home:       { label: '首页',     url: '/' },
  about:      { label: '关于我们', url: '/about/' },
  milestones: { label: '大事记',   url: '/about/milestones.html' },
  solutions:  { label: '解决方案', url: '/solutions/' },
};

let currentOverrides = {}; // 已发布的基线（GET /content 结果），module script 的 loadContent/save 读写
let pendingZh = {};
let pendingJa = {};
let pendingEn = {};
let editingEl = null;
let editingOriginal = '';

const FRAME_STYLE = `
  [data-i18n]:hover { outline: 1px dashed #2563eb; outline-offset: 2px; cursor: text; }
  [data-i18n][contenteditable="true"] { outline: 2px solid #2563eb; outline-offset: 2px; cursor: text; background: #eef2ff; }
  .cms-pill {
    position: absolute; z-index: 999999; display: flex; gap: 6px;
    background: #1f1c17; border-radius: 8px; padding: 5px 7px; box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .cms-pill button {
    border: none; border-radius: 5px; font-size: 12px; font-family: system-ui, sans-serif;
    padding: 4px 9px; cursor: pointer;
  }
  .cms-pill .cms-ok { background: #10b981; color: #fff; }
  .cms-pill .cms-cancel { background: #4b5563; color: #fff; }
`;

function updateChangesBar() {
  const count = Object.keys(pendingZh).length;
  const bar = document.getElementById('changes-bar');
  bar.hidden = count === 0;
  document.getElementById('changes-count').textContent = `已改 ${count} 处`;
}

// 保存/同步/切页前都要调用：如果有字段还在编辑中（用户没点"✓ 完成"就去点了别的按钮），
// 自动帮他确认一下，避免"看起来保存了，其实刚打的字丢了"。
function commitActiveEdit() {
  if (editingEl) finishEdit(true);
}

/* ── 页面切换 ── */
function switchPage(key) {
  commitActiveEdit();
  document.querySelectorAll('.page-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.page === key);
  });
  const frame = document.getElementById('preview-frame');
  frame.onload = () => initEditableFrame(frame);
  frame.src = PAGES[key].url + '?lang=zh';
}

/* ── 让 iframe 里的 [data-i18n] 元素可点击就地编辑（同源，直接操作 contentDocument） ── */
function initEditableFrame(frame) {
  const doc = frame.contentDocument;
  if (!doc) return;

  const style = doc.createElement('style');
  style.textContent = FRAME_STYLE;
  doc.head.appendChild(style);

  // 把本次会话里已改但未发布的值，重新套到刚加载的页面上——
  // 否则切走标签再切回来，看到的是发布前的旧文字，像是改动丢了。
  doc.querySelectorAll('[data-i18n]').forEach((el) => {
    const key = el.dataset.i18n;
    if (pendingZh[key] !== undefined) el.textContent = pendingZh[key];
  });

  editingEl = null;

  doc.addEventListener(
    'click',
    (e) => {
      const el = e.target.closest('[data-i18n]');
      if (el && el.isContentEditable) return; // 已在编辑中，交给浏览器处理光标定位
      e.preventDefault(); // 预览态下不允许真的跳转
      if (el) startEdit(doc, el);
    },
    true,
  );
}

/* ── 开始编辑一个字段 ── */
function startEdit(doc, el) {
  if (editingEl && editingEl !== el) finishEdit(true); // 切到新字段前，先确认上一个

  editingEl = el;
  editingOriginal = el.textContent;
  el.contentEditable = 'true';
  el.focus();

  el.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || doc.defaultView.clipboardData).getData('text/plain');
    doc.execCommand('insertText', false, text);
  });

  const range = doc.createRange();
  range.selectNodeContents(el);
  const sel = doc.defaultView.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const pill = doc.createElement('div');
  pill.className = 'cms-pill';
  pill.id = 'cms-active-pill';
  pill.innerHTML =
    '<button type="button" class="cms-ok">✓ 完成</button><button type="button" class="cms-cancel">✕ 取消</button>';
  doc.body.appendChild(pill);
  const rect = el.getBoundingClientRect();
  pill.style.top = `${Math.max(0, rect.top - 40)}px`;
  pill.style.left = `${rect.left}px`;
  pill.querySelector('.cms-ok').onclick = (e) => {
    e.preventDefault();
    finishEdit(true);
  };
  pill.querySelector('.cms-cancel').onclick = (e) => {
    e.preventDefault();
    finishEdit(false);
  };
}

/* ── 结束编辑：commit=true 确认保留，false 撤销还原 ── */
function finishEdit(commit) {
  if (!editingEl) return;
  const doc = editingEl.ownerDocument;
  const key = editingEl.dataset.i18n;

  if (commit) {
    const newVal = editingEl.innerText.trim();
    if (newVal && newVal !== editingOriginal.trim()) {
      pendingZh[key] = newVal;
      updateChangesBar();
    }
  } else {
    editingEl.textContent = editingOriginal;
  }

  editingEl.contentEditable = 'false';
  const pill = doc.getElementById('cms-active-pill');
  if (pill) pill.remove();
  editingEl = null;
}
</script>

<script type="module">
import { auth } from '/js/shared/firebase-init.js';
import { isAdmin } from '/js/shared/admins.js';
import { onAuthStateChanged, signInWithEmailAndPassword, signOut }
  from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

// 保存通道：站长自己 CF 账号下的 sdf-admin Worker（服务端持有 GitHub 令牌）
const WORKER_URL = 'https://sdf-admin.sherlockafa.workers.dev';
// 发布后轮询镜像仓库 HEAD 确认上线（镜像 HEAD == 本次 commit 即同步完成）
const MIRROR_API = 'https://api.github.com/repos/Eveysnow5/senridf-web/commits/main';

async function api(method, path, body) {
  const idToken = await auth.currentUser.getIdToken(); // SDK 自动续期
  const res = await fetch(WORKER_URL + path, {
    method,
    headers: {
      Authorization: `Bearer ${idToken}`,
      ...(body ? { 'Content-Type': 'application/json' } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch { /* 非 JSON 响应按状态码报错 */ }
  if (!res.ok) throw new Error(data.error || `请求失败（${res.status}）`);
  return data;
}

async function loadContent() {
  const { content } = await api('GET', '/content');
  currentOverrides = content || {};
  document.getElementById('editor').style.display = 'block';
  switchPage('home');
}

async function waitForDeploy(commitSha, statusEl) {
  statusEl.className = 'status'; statusEl.textContent = '✓ 已保存，同步部署中…（约2-3分钟）';
  for (let i = 0; i < 15; i++) {
    await new Promise(r => setTimeout(r, 20000));
    try {
      const res = await fetch(MIRROR_API);
      const data = await res.json();
      if (data.sha === commitSha) {
        statusEl.className = 'status ok';
        statusEl.textContent = '✓ 已上线（如未见变化，等约1分钟后刷新网站）';
        return;
      }
    } catch { /* 网络抖动，继续轮询 */ }
  }
  statusEl.textContent = '已保存；上线状态未确认，稍后可直接查看网站';
}

window.save = async function () {
  commitActiveEdit();
  const btn = document.getElementById('save-btn');
  const statusEl = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '保存中…';
  statusEl.className = 'status';
  statusEl.textContent = '';
  try {
    const ov = {
      zh: { ...currentOverrides.zh, ...pendingZh },
      ja: { ...currentOverrides.ja, ...pendingJa },
      en: { ...currentOverrides.en, ...pendingEn },
      images: { ...currentOverrides.images },
    };
    const { commitSha } = await api('PUT', '/content', { content: ov });
    currentOverrides = ov;
    pendingZh = {};
    pendingJa = {};
    pendingEn = {};
    updateChangesBar();
    waitForDeploy(commitSha, statusEl);
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = '✗ 保存失败：' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '保存并发布';
};

window.syncTranslate = async function () {
  commitActiveEdit();
  const fields = Object.entries(pendingZh).map(([key, zh]) => ({ key, zh }));
  if (fields.length === 0) return;
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.textContent = '同步中…';
  try {
    const result = await api('POST', '/translate', { fields });
    Object.assign(pendingJa, result.ja || {});
    Object.assign(pendingEn, result.en || {});
    const synced = Object.keys(result.ja || {}).length;
    btn.textContent =
      synced >= fields.length ? '✓ 已同步日英' : `已同步 ${synced}/${fields.length} 处，可重试补齐`;
  } catch (e) {
    btn.textContent = '同步失败，点击重试';
  }
  btn.disabled = false;
};

window.fbLogout = () => signOut(auth).then(() => location.reload());

onAuthStateChanged(auth, user => {
  if (isAdmin(user)) {
    document.getElementById('fb-login').style.display = 'none';
    loadContent().catch(e => {
      document.getElementById('fb-login').style.display = 'flex';
      document.getElementById('fb-err').textContent = '内容加载失败：' + e.message;
    });
  } else if (user) {
    document.getElementById('fb-err').textContent = '该账号无管理员权限。';
  } else {
    document.getElementById('fb-login').style.display = 'flex';
  }
});

window.fbLogin = async function() {
  const email = document.getElementById('fb-email').value.trim();
  const password = document.getElementById('fb-password').value;
  const errEl = document.getElementById('fb-err');
  const btn = document.getElementById('fb-login-btn');
  errEl.textContent = ''; btn.disabled = true; btn.textContent = '登录中…';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch {
    errEl.textContent = '邮箱或密码错误，请重试。';
    btn.disabled = false; btn.textContent = '登录';
  }
};
</script>
