<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文稿校对 — 千里同風</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
    .hidden { display: none; }
    .tab-btn.active { border-color: #6366f1; color: #4338ca; background: #eef2ff; }
    .result-card code { background: #fef2f2; color: #b91c1c; padding: 1px 5px; border-radius: 4px; font-size: 0.85em; font-family: monospace; }
    .result-card strong { font-weight: 600; }
    .result-card blockquote { border-left: 3px solid #d1d5db; padding-left: 12px; color: #9ca3af; font-style: italic; margin: 8px 0; }
    .result-card li { margin-bottom: 14px; line-height: 1.7; }
    .result-card ul { list-style: none; padding: 0; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Login -->
  <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <h1 class="text-xl font-semibold text-gray-900 mb-1">千里同風 内部工具</h1>
      <p class="text-sm text-gray-500 mb-6">文稿校对助手</p>
      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input id="email" type="email" autocomplete="email" title="邮箱" placeholder="your@email.com"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input id="password" type="password" autocomplete="current-password" title="密码" placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <button type="button" id="login-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
          登录
        </button>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
        <div>
          <h1 class="text-base font-semibold text-gray-900">文稿校对助手</h1>
          <p class="text-xs text-gray-500">错别字 · 重复 · 编辑指令 · 逻辑冲突</p>
        </div>
        <div class="flex items-center gap-3">
          <span id="user-email" class="text-xs text-gray-400 hidden sm:block"></span>
          <button type="button" id="logout-btn" class="text-xs text-gray-500 hover:text-gray-800">退出</button>
        </div>
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">

      <!-- Input card -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-5">

        <!-- Tabs -->
        <div class="flex gap-2 mb-4">
          <button type="button" class="tab-btn active px-4 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 transition-colors" data-tab="paste">粘贴文本</button>
          <button type="button" class="tab-btn px-4 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 transition-colors" data-tab="upload">上传 Word</button>
        </div>

        <!-- Paste tab -->
        <div id="tab-paste">
          <textarea id="text-input" rows="12"
            placeholder="请将中文文稿粘贴于此…"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400 leading-relaxed"></textarea>
          <div class="flex justify-between items-center mt-2 text-xs text-gray-400">
            <span>支持中文新闻稿、文章、稿件</span>
            <span id="char-count">0 / 20,000 字</span>
          </div>
        </div>

        <!-- Upload tab -->
        <div id="tab-upload" class="hidden">
          <label for="file-input"
            class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-200 rounded-lg cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-colors">
            <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span class="text-sm text-gray-500">点击选择 .docx 或 .txt 文件</span>
            <span id="file-name" class="text-xs text-indigo-600 mt-1"></span>
          </label>
          <input type="file" id="file-input" accept=".docx,.txt" class="hidden" title="上传文件" />
          <p id="file-error" class="hidden mt-2 text-xs text-red-500"></p>
        </div>

        <div id="input-error" class="hidden mt-3 text-sm text-red-500"></div>

        <button type="button" id="check-btn"
          class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          开始校对
        </button>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden flex flex-col items-center py-16 gap-4">
        <div class="spinner"></div>
        <p class="text-sm text-gray-500">正在校对，请稍候（约 10–30 秒）…</p>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <div id="results-summary" class="flex items-center justify-between mb-4">
          <p class="text-sm font-medium text-gray-700"></p>
          <button type="button" id="copy-btn"
            class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">
            复制完整报告
          </button>
        </div>
        <div id="results-cards" class="space-y-4"></div>
        <p class="text-xs text-gray-400 mt-4 text-center">以上内容由 AI 生成，仅供参考，请以人工判断为准</p>
      </div>

    </main>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const app = initializeApp({
      apiKey: 'AIzaSyCjtAqIrGkiqDiETUqxcmkhyBVoa2IHQNM',
      authDomain: 'senridfauthentication.firebaseapp.com',
      projectId: 'senridfauthentication',
      storageBucket: 'senridfauthentication.firebasestorage.app',
      messagingSenderId: '86494932585',
      appId: '1:86494932585:web:185b8ed922cd491a63fcf8',
    });

    const auth = getAuth(app);

    // ── Auth ──────────────────────────────────────────────────────────────
    const loginScreen = document.getElementById('login-screen');
    const appEl = document.getElementById('app');
    const loginError = document.getElementById('login-error');

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      loginError.classList.add('hidden');
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch {
        loginError.textContent = '邮箱或密码错误，请重试';
        loginError.classList.remove('hidden');
      }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.classList.add('hidden');
        appEl.classList.remove('hidden');
        document.getElementById('user-email').textContent = user.email;
      } else {
        loginScreen.classList.remove('hidden');
        appEl.classList.add('hidden');
      }
    });

    // ── Tab switching ────────────────────────────────────────────────────
    let activeTab = 'paste';
    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-paste').classList.toggle('hidden', activeTab !== 'paste');
        document.getElementById('tab-upload').classList.toggle('hidden', activeTab !== 'upload');
        document.getElementById('input-error').classList.add('hidden');
      });
    });

    // ── Char count ───────────────────────────────────────────────────────
    const textInput = document.getElementById('text-input');
    const charCount = document.getElementById('char-count');
    textInput.addEventListener('input', () => {
      const n = textInput.value.length;
      charCount.textContent = `${n.toLocaleString()} / 20,000 字`;
      charCount.className = n > 20000 ? 'text-xs text-red-500' : 'text-xs text-gray-400';
    });

    // ── Word file upload ─────────────────────────────────────────────────
    let uploadedText = '';
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const fileError = document.getElementById('file-error');

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      fileError.classList.add('hidden');
      fileName.textContent = '解析中…';

      try {
        const arrayBuffer = await file.arrayBuffer();

        if (file.name.endsWith('.txt')) {
          uploadedText = new TextDecoder('utf-8').decode(arrayBuffer);
        } else {
          // mammoth for .docx
          const result = await mammoth.extractRawValue({ arrayBuffer });
          uploadedText = result.value;
        }

        fileName.textContent = `✓ ${file.name}（${uploadedText.length.toLocaleString()} 字）`;
      } catch (err) {
        fileError.textContent = '文件解析失败，请尝试另存为 .txt 后上传';
        fileError.classList.remove('hidden');
        fileName.textContent = '';
        uploadedText = '';
      }
    });

    // ── Categories config ────────────────────────────────────────────────
    const CATS = [
      { keywords: ['一、错别字', '错别字'], label: '一、错别字', color: 'red',    badge: 'bg-red-100 text-red-700',    border: 'border-red-200',   head: 'bg-red-50' },
      { keywords: ['二、重复',   '重复或'], label: '二、重复或未完成的句子', color: 'amber',  badge: 'bg-amber-100 text-amber-700', border: 'border-amber-200', head: 'bg-amber-50' },
      { keywords: ['三、编辑',   '编辑指'], label: '三、编辑指令和插入提示', color: 'blue',   badge: 'bg-blue-100 text-blue-700',   border: 'border-blue-200',  head: 'bg-blue-50' },
      { keywords: ['四、前后',   '逻辑和'], label: '四、前后逻辑和细节冲突', color: 'purple', badge: 'bg-purple-100 text-purple-700',border: 'border-purple-200',head: 'bg-purple-50' },
    ];

    // ── Markdown → HTML (minimal) ────────────────────────────────────────
    function renderSection(md) {
      // Escape HTML first
      let html = md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // Blockquotes
      html = html.replace(/^&gt; (.+)$/gm,
        '<blockquote>$1</blockquote>');

      // Inline code
      html = html.replace(/`([^`]+)`/g,
        '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*([^*\n]+)\*\*/g,
        '<strong>$1</strong>');

      // List items — each "- " starts a new <li>
      // Split into lines and group list items
      const lines = html.split('\n');
      const out = [];
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (/^- /.test(line)) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${line.slice(2)}`);
        } else if (/^\s{2,}/.test(line) && inList) {
          // continuation of previous list item
          out.push(`<br>${line.trim()}`);
        } else {
          if (inList) { out.push('</li></ul>'); inList = false; }
          if (line.trim()) out.push(`<p>${line}</p>`);
        }
      }
      if (inList) out.push('</li></ul>');

      return out.join('\n');
    }

    function parseSections(markdown) {
      const parts = markdown.split(/^##\s+/m);
      const sections = {};
      for (const part of parts) {
        if (!part.trim()) continue;
        const firstLine = part.split('\n')[0];
        const content = part.slice(firstLine.length + 1).trim();
        for (const cat of CATS) {
          if (cat.keywords.some((kw) => firstLine.includes(kw))) {
            const count = (content.match(/- \*\*原文\*\*/g) || []).length;
            sections[cat.label] = { content, count };
            break;
          }
        }
      }
      return sections;
    }

    // ── Proofreading ─────────────────────────────────────────────────────
    let lastRawResult = '';

    document.getElementById('check-btn').addEventListener('click', async () => {
      const inputErr = document.getElementById('input-error');
      inputErr.classList.add('hidden');

      let text = '';
      if (activeTab === 'paste') {
        text = textInput.value.trim();
      } else {
        text = uploadedText.trim();
      }

      if (!text) {
        inputErr.textContent = activeTab === 'paste' ? '请先粘贴文稿' : '请先上传文件';
        inputErr.classList.remove('hidden');
        return;
      }
      if (text.length > 20000) {
        inputErr.textContent = `文本超过 20,000 字（当前 ${text.length.toLocaleString()} 字），超出部分将被截断`;
        inputErr.classList.remove('hidden');
      }

      // Show loading
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('check-btn').disabled = true;

      try {
        const res = await fetch('/api/proofread', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || '请求失败');

        lastRawResult = data.result;
        showResults(data.result, data.truncated);
      } catch (err) {
        inputErr.textContent = '校对失败：' + err.message;
        inputErr.classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('check-btn').disabled = false;
      }
    });

    function showResults(markdown, truncated) {
      const sections = parseSections(markdown);
      const totalIssues = Object.values(sections).reduce((s, v) => s + v.count, 0);

      const summaryEl = document.querySelector('#results-summary p');
      summaryEl.textContent = `发现 ${totalIssues} 处可能的问题${truncated ? '（文本已截断至 20,000 字）' : ''}`;

      const cardsEl = document.getElementById('results-cards');
      cardsEl.innerHTML = CATS.map((cat) => {
        const sec = sections[cat.label];
        const count = sec ? sec.count : 0;
        const content = sec ? renderSection(sec.content) : '<p class="text-gray-400 italic text-sm">未找到对应章节</p>';

        return `
          <div class="bg-white rounded-xl border ${cat.border} shadow-sm overflow-hidden result-card">
            <div class="${cat.head} px-5 py-3 flex items-center justify-between">
              <span class="text-sm font-medium text-gray-800">${cat.label}</span>
              <span class="px-2 py-0.5 rounded-full text-xs font-medium ${cat.badge}">${count > 0 ? count + ' 处' : '无'}</span>
            </div>
            <div class="px-5 py-4 text-sm text-gray-700 leading-relaxed">
              ${content}
            </div>
          </div>`;
      }).join('');

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Copy report ───────────────────────────────────────────────────────
    document.getElementById('copy-btn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(lastRawResult);
        const btn = document.getElementById('copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '复制完整报告'; }, 2000);
      } catch {
        alert('复制失败，请手动选择文本复制');
      }
    });
  </script>
</body>
</html>
