<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文稿校对 — 千里同風</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
    .hidden { display: none; }
    .tab-btn.active { border-color: #6366f1; color: #4338ca; background: #eef2ff; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dismiss-btn.confirmed { background: #d1fae5 !important; border-color: #6ee7b7 !important; color: #059669 !important; }
    .error-item.dismissed-hidden { display: none; }
    .error-item.dismissed-visible { opacity: 0.4; }
    .error-item.dismissed-visible .original { text-decoration: line-through; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Login -->
  <div id="login-screen" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
      <h1 class="text-xl font-semibold text-gray-900 mb-1">千里同風 内部工具</h1>
      <p class="text-sm text-gray-500 mb-6">文稿校对助手</p>
      <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
          <input id="email" type="email" autocomplete="email" title="邮箱" placeholder="your@email.com"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input id="password" type="password" autocomplete="current-password" title="密码" placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <button type="button" id="login-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
          登录
        </button>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
        <div>
          <h1 class="text-base font-semibold text-gray-900">文稿校对助手</h1>
          <p class="text-xs text-gray-500">错别字 · 重复 · 编辑指令 · 逻辑冲突 · 标题一致性</p>
        </div>
        <div class="flex items-center gap-2">
          <button type="button" id="history-btn"
            class="text-xs text-gray-500 hover:text-gray-700 px-2.5 py-1 rounded border border-gray-200 hover:border-gray-300 transition-colors">历史</button>
          <span id="user-email" class="text-xs text-gray-400 hidden sm:block"></span>
          <button type="button" id="logout-btn" class="text-xs text-gray-500 hover:text-gray-800 ml-1">退出</button>
        </div>
      </div>
    </header>

    <!-- History panel -->
    <div id="history-panel" class="hidden bg-white border-b border-gray-200 shadow-sm">
      <div class="max-w-3xl mx-auto px-4 py-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-medium text-gray-700">历史校对记录（最近 30 次）</h3>
          <div class="flex gap-3">
            <button type="button" id="clear-history-btn"
              class="text-xs text-red-400 hover:text-red-600 transition-colors">清除全部</button>
            <button type="button" id="close-history-btn"
              class="text-xs text-gray-400 hover:text-gray-600">关闭</button>
          </div>
        </div>
        <div id="history-content"></div>
      </div>
    </div>

    <main class="max-w-3xl mx-auto px-4 py-6">

      <!-- Input card -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-5">
        <div class="flex gap-2 mb-4">
          <button type="button" class="tab-btn active px-4 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 transition-colors" data-tab="paste">粘贴文本</button>
          <button type="button" class="tab-btn px-4 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 transition-colors" data-tab="upload">上传 Word</button>
        </div>

        <div id="tab-paste">
          <textarea id="text-input" rows="12" placeholder="请将中文文稿粘贴于此…"
            class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm resize-y focus:outline-none focus:ring-2 focus:ring-indigo-400 leading-relaxed"></textarea>
          <div class="flex justify-between items-center mt-2 text-xs text-gray-400">
            <span>支持中文新闻稿、文章、稿件</span>
            <span id="char-count">0 / 20,000 字</span>
          </div>
        </div>

        <div id="tab-upload" class="hidden">
          <label for="file-input"
            class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-gray-200 rounded-lg cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-colors">
            <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span class="text-sm text-gray-500">点击选择 .docx 或 .txt 文件</span>
            <span id="file-name" class="text-xs text-indigo-600 mt-1"></span>
          </label>
          <input type="file" id="file-input" accept=".docx,.txt" class="hidden" title="上传文件" />
          <p id="file-error" class="hidden mt-2 text-xs text-red-500"></p>
        </div>

        <div id="input-error" class="hidden mt-3 text-sm text-red-500"></div>

        <button type="button" id="check-btn"
          class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          开始校对
        </button>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden flex flex-col items-center py-16 gap-4">
        <div class="spinner"></div>
        <p class="text-sm text-gray-500">正在校对，请稍候（约 10–30 秒）…</p>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
          <p id="results-summary-text" class="text-sm font-medium text-gray-700"></p>
          <div class="flex items-center gap-2 flex-wrap">
            <button type="button" id="toggle-all-btn"
              class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">展开全部</button>
            <button type="button" id="toggle-dismissed-btn"
              class="hidden text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors"></button>
            <button type="button" id="copy-btn"
              class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">复制完整报告</button>
          </div>
        </div>
        <p class="text-xs text-gray-400 mb-3">点击条目展开查看问题说明；点击 ✓ 标记为已确认无误（可恢复）</p>
        <div id="results-cards" class="space-y-4"></div>
        <p class="text-xs text-gray-400 mt-4 text-center">以上内容由 AI 生成，仅供参考，请以人工判断为准</p>
      </div>

    </main>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const app = initializeApp({
      apiKey: 'AIzaSyCjtAqIrGkiqDiETUqxcmkhyBVoa2IHQNM',
      authDomain: 'senridfauthentication.firebaseapp.com',
      projectId: 'senridfauthentication',
      storageBucket: 'senridfauthentication.firebasestorage.app',
      messagingSenderId: '86494932585',
      appId: '1:86494932585:web:185b8ed922cd491a63fcf8',
    });
    const auth = getAuth(app);

    // ── Auth ────────────────────────────────────────────────────────────────
    const loginScreen = document.getElementById('login-screen');
    const appEl = document.getElementById('app');
    const loginError = document.getElementById('login-error');

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      loginError.classList.add('hidden');
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch {
        loginError.textContent = '邮箱或密码错误，请重试';
        loginError.classList.remove('hidden');
      }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginScreen.classList.add('hidden');
        appEl.classList.remove('hidden');
        document.getElementById('user-email').textContent = user.email;
      } else {
        loginScreen.classList.remove('hidden');
        appEl.classList.add('hidden');
      }
    });

    // ── Tab switching ───────────────────────────────────────────────────────
    let activeTab = 'paste';
    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-paste').classList.toggle('hidden', activeTab !== 'paste');
        document.getElementById('tab-upload').classList.toggle('hidden', activeTab !== 'upload');
        document.getElementById('input-error').classList.add('hidden');
      });
    });

    // ── Char count ──────────────────────────────────────────────────────────
    const textInput = document.getElementById('text-input');
    const charCount = document.getElementById('char-count');
    textInput.addEventListener('input', () => {
      const n = textInput.value.length;
      charCount.textContent = `${n.toLocaleString()} / 20,000 字`;
      charCount.className = n > 20000 ? 'text-xs text-red-500' : 'text-xs text-gray-400';
    });

    // ── File upload ─────────────────────────────────────────────────────────
    let uploadedText = '';
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const fileError = document.getElementById('file-error');

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileError.classList.add('hidden');
      fileName.textContent = '解析中…';
      try {
        const arrayBuffer = await file.arrayBuffer();
        if (file.name.endsWith('.txt')) {
          uploadedText = new TextDecoder('utf-8').decode(arrayBuffer);
        } else {
          const result = await mammoth.extractRawValue({ arrayBuffer });
          uploadedText = result.value;
        }
        fileName.textContent = `✓ ${file.name}（${uploadedText.length.toLocaleString()} 字）`;
      } catch {
        fileError.textContent = '文件解析失败，请尝试另存为 .txt 后上传';
        fileError.classList.remove('hidden');
        fileName.textContent = '';
        uploadedText = '';
      }
    });

    // ── Categories ──────────────────────────────────────────────────────────
    const CATS = [
      { key: 'typos',  keywords: ['一、错别字'], label: '一、错别字',           short: '错别字', badge: 'bg-red-100 text-red-700',     border: 'border-red-200',    head: 'bg-red-50' },
      { key: 'repeat', keywords: ['二、重复'],   label: '二、重复或未完成的句子', short: '重复句', badge: 'bg-amber-100 text-amber-700', border: 'border-amber-200',  head: 'bg-amber-50' },
      { key: 'marks',  keywords: ['三、编辑'],   label: '三、编辑指令和插入提示', short: '编辑指令', badge: 'bg-blue-100 text-blue-700',  border: 'border-blue-200',   head: 'bg-blue-50' },
      { key: 'logic',  keywords: ['四、前后'],   label: '四、前后逻辑和细节冲突', short: '逻辑',  badge: 'bg-purple-100 text-purple-700', border: 'border-purple-200', head: 'bg-purple-50' },
      { key: 'title',  keywords: ['五、标题'],   label: '五、标题与正文一致性',   short: '标题',  badge: 'bg-green-100 text-green-700',  border: 'border-green-200',  head: 'bg-green-50' },
    ];

    // ── Helpers ─────────────────────────────────────────────────────────────
    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // ── History (localStorage) ──────────────────────────────────────────────
    const HIST_KEY = 'proofreader_history';

    function saveHistory(preview, sections) {
      const counts = {};
      CATS.forEach((cat) => { counts[cat.key] = sections[cat.label]?.count || 0; });
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      const hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
      hist.unshift({ ts: Date.now(), preview: preview.replace(/\s+/g, ' ').trim().slice(0, 50), counts, total });
      if (hist.length > 30) hist.length = 30;
      localStorage.setItem(HIST_KEY, JSON.stringify(hist));
    }

    function renderHistory() {
      const hist = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
      const el = document.getElementById('history-content');
      if (!hist.length) {
        el.innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">暂无历史记录</p>';
        return;
      }
      const catHeaders = CATS.map((c) =>
        `<th class="px-2 py-2 text-xs font-medium text-gray-500 text-center whitespace-nowrap">${c.short}</th>`
      ).join('');
      const rows = hist.map((h) => {
        const d = new Date(h.ts);
        const ds = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        const cells = CATS.map((c) => {
          const n = h.counts[c.key] || 0;
          return `<td class="px-2 py-2 text-center text-xs ${n ? 'font-medium text-gray-800' : 'text-gray-300'}">${n || '—'}</td>`;
        }).join('');
        return `<tr class="border-t border-gray-100 hover:bg-gray-50">
          <td class="px-3 py-2 text-xs text-gray-400 whitespace-nowrap">${ds}</td>
          <td class="px-3 py-2 text-xs text-gray-600 max-w-xs truncate" title="${esc(h.preview)}">${esc(h.preview)}</td>
          ${cells}
          <td class="px-2 py-2 text-center text-xs font-semibold ${h.total ? 'text-indigo-700' : 'text-gray-400'}">${h.total || '—'}</td>
        </tr>`;
      }).join('');
      el.innerHTML = `<div class="overflow-x-auto">
        <table class="w-full min-w-[540px]">
          <thead><tr class="bg-gray-50">
            <th class="px-3 py-2 text-xs font-medium text-gray-500 text-left whitespace-nowrap">时间</th>
            <th class="px-3 py-2 text-xs font-medium text-gray-500 text-left">文稿</th>
            ${catHeaders}
            <th class="px-2 py-2 text-xs font-medium text-gray-500 text-center">合计</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    // ── Error item parsing ──────────────────────────────────────────────────
    function parseErrorItems(content) {
      if (!content.trim() || /^>\s/.test(content.trim())) return [];
      const items = [];
      const lines = content.split('\n');
      let cur = null;
      for (const line of lines) {
        const oM = line.match(/^- \*\*原文\*\*[：:]\s*`?(.+?)`?\s*$/);
        const iM = line.match(/^\s*\*\*问题\*\*[：:]\s*(.+)/);
        const sM = line.match(/^\s*\*\*建议\*\*[：:]\s*(.+)/);
        if (oM) { if (cur) items.push(cur); cur = { original: oM[1].trim(), issue: '', suggestion: '' }; }
        else if (iM && cur) cur.issue = iM[1].trim();
        else if (sM && cur) cur.suggestion = sM[1].trim();
      }
      if (cur) items.push(cur);
      return items;
    }

    function parseSections(markdown) {
      const parts = markdown.split(/^##\s+/m);
      const sections = {};
      for (const part of parts) {
        if (!part.trim()) continue;
        const firstLine = part.split('\n')[0];
        const content = part.slice(firstLine.length + 1).trim();
        for (const cat of CATS) {
          if (cat.keywords.some((kw) => firstLine.includes(kw))) {
            const isNoIssues = /^>\s/.test(content.trim());
            const items = isNoIssues ? [] : parseErrorItems(content);
            sections[cat.label] = { count: items.length, items, isNoIssues };
            break;
          }
        }
      }
      return sections;
    }

    // ── Error item HTML ─────────────────────────────────────────────────────
    function renderErrorItem(item, id) {
      return `<div class="error-item border-b border-gray-100 last:border-0" id="${id}">
        <div class="error-header flex items-start gap-3 px-5 py-2.5 cursor-pointer hover:bg-gray-50 group" data-error-id="${id}">
          <button type="button"
            class="dismiss-btn shrink-0 mt-0.5 w-5 h-5 rounded border border-gray-300 text-gray-300 flex items-center justify-center text-xs transition-all group-hover:border-gray-400 group-hover:text-gray-400"
            title="标记为无误" data-dismiss-id="${id}">✓</button>
          <span class="original flex-1 text-sm font-mono text-red-700 bg-red-50 px-2 py-0.5 rounded break-all">${esc(item.original)}</span>
          <span class="expand-icon shrink-0 mt-1.5 text-gray-300 text-xs transition-transform duration-150">▶</span>
        </div>
        <div class="error-detail px-5 pb-3 space-y-1.5" style="padding-left:3.25rem;display:none">
          <div class="text-sm text-gray-700"><span class="text-xs text-gray-400 mr-1.5">问题</span>${esc(item.issue)}</div>
          <div class="text-sm text-indigo-700"><span class="text-xs text-gray-400 mr-1.5">建议</span>${esc(item.suggestion)}</div>
        </div>
      </div>`;
    }

    // ── Dismiss state ───────────────────────────────────────────────────────
    const dismissedIds = new Set();
    let showingDismissed = false;

    function toggleDismiss(id) {
      const item = document.getElementById(id);
      if (!item) return;
      const btn = item.querySelector('.dismiss-btn');
      if (dismissedIds.has(id)) {
        dismissedIds.delete(id);
        item.classList.remove('dismissed-hidden', 'dismissed-visible');
        btn.classList.remove('confirmed');
        btn.title = '标记为无误';
      } else {
        dismissedIds.add(id);
        btn.classList.add('confirmed');
        btn.title = '已确认无误，点击恢复';
        item.classList.add(showingDismissed ? 'dismissed-visible' : 'dismissed-hidden');
      }
      updateDismissedBtn();
    }

    function updateDismissedBtn() {
      const n = dismissedIds.size;
      const btn = document.getElementById('toggle-dismissed-btn');
      if (n === 0) {
        btn.classList.add('hidden');
      } else {
        btn.classList.remove('hidden');
        btn.textContent = showingDismissed ? `隐藏已忽略 (${n})` : `显示已忽略 (${n})`;
      }
    }

    document.getElementById('toggle-dismissed-btn').addEventListener('click', () => {
      showingDismissed = !showingDismissed;
      dismissedIds.forEach((id) => {
        const item = document.getElementById(id);
        if (!item) return;
        if (showingDismissed) {
          item.classList.replace('dismissed-hidden', 'dismissed-visible');
        } else {
          item.classList.replace('dismissed-visible', 'dismissed-hidden');
        }
      });
      updateDismissedBtn();
    });

    // ── Expand / collapse ───────────────────────────────────────────────────
    let allExpanded = false;

    function toggleItemExpand(id) {
      const item = document.getElementById(id);
      if (!item || dismissedIds.has(id)) return;
      const detail = item.querySelector('.error-detail');
      const icon = item.querySelector('.expand-icon');
      const expanding = detail.style.display === 'none';
      detail.style.display = expanding ? 'block' : 'none';
      icon.style.transform = expanding ? 'rotate(90deg)' : '';
    }

    document.getElementById('toggle-all-btn').addEventListener('click', () => {
      allExpanded = !allExpanded;
      document.querySelectorAll('.error-detail').forEach((d) => {
        d.style.display = allExpanded ? 'block' : 'none';
      });
      document.querySelectorAll('.expand-icon').forEach((i) => {
        i.style.transform = allExpanded ? 'rotate(90deg)' : '';
      });
      document.getElementById('toggle-all-btn').textContent = allExpanded ? '折叠全部' : '展开全部';
    });

    // ── Event delegation ────────────────────────────────────────────────────
    document.getElementById('results-cards').addEventListener('click', (e) => {
      const dismissBtn = e.target.closest('[data-dismiss-id]');
      if (dismissBtn) {
        e.stopPropagation();
        toggleDismiss(dismissBtn.dataset.dismissId);
        return;
      }
      const header = e.target.closest('[data-error-id]');
      if (header) toggleItemExpand(header.dataset.errorId);
    });

    // ── History panel ───────────────────────────────────────────────────────
    const histPanel = document.getElementById('history-panel');
    document.getElementById('history-btn').addEventListener('click', () => {
      const isOpen = !histPanel.classList.contains('hidden');
      if (isOpen) { histPanel.classList.add('hidden'); return; }
      renderHistory();
      histPanel.classList.remove('hidden');
    });
    document.getElementById('close-history-btn').addEventListener('click', () => {
      histPanel.classList.add('hidden');
    });
    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (!confirm('确定清除全部历史记录？')) return;
      localStorage.removeItem(HIST_KEY);
      renderHistory();
    });

    // ── Proofreading ────────────────────────────────────────────────────────
    let lastRawResult = '';

    document.getElementById('check-btn').addEventListener('click', async () => {
      const inputErr = document.getElementById('input-error');
      inputErr.classList.add('hidden');
      const text = (activeTab === 'paste' ? textInput.value : uploadedText).trim();
      if (!text) {
        inputErr.textContent = activeTab === 'paste' ? '请先粘贴文稿' : '请先上传文件';
        inputErr.classList.remove('hidden');
        return;
      }
      if (text.length > 20000) {
        inputErr.textContent = `文本超过 20,000 字（当前 ${text.length.toLocaleString()} 字），超出部分将被截断`;
        inputErr.classList.remove('hidden');
      }
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('check-btn').disabled = true;
      try {
        const res = await fetch('/api/proofread', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || '请求失败');
        lastRawResult = data.result;
        showResults(data.result, data.truncated, text);
      } catch (err) {
        inputErr.textContent = '校对失败：' + err.message;
        inputErr.classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('check-btn').disabled = false;
      }
    });

    function showResults(markdown, truncated, inputText) {
      dismissedIds.clear();
      showingDismissed = false;
      allExpanded = false;
      document.getElementById('toggle-all-btn').textContent = '展开全部';
      updateDismissedBtn();

      const sections = parseSections(markdown);
      const total = Object.values(sections).reduce((s, v) => s + v.count, 0);

      saveHistory(inputText, sections);

      document.getElementById('results-summary-text').textContent =
        `发现 ${total} 处可能的问题${truncated ? '（文本已截断至 20,000 字）' : ''}`;

      document.getElementById('results-cards').innerHTML = CATS.map((cat, ci) => {
        const sec = sections[cat.label];
        const count = sec ? sec.count : 0;
        let body;
        if (!sec) {
          body = '<p class="text-xs text-gray-400 px-5 py-4 italic">未找到对应章节</p>';
        } else if (sec.isNoIssues || count === 0) {
          body = '<p class="text-sm text-gray-400 italic px-5 py-3 my-2 border-l-2 border-gray-200 mx-5">未发现问题</p>';
        } else {
          body = `<div>${sec.items.map((item, i) => renderErrorItem(item, `e-${ci}-${i}`)).join('')}</div>`;
        }
        return `<div class="bg-white rounded-xl border ${cat.border} shadow-sm overflow-hidden">
          <div class="${cat.head} px-5 py-3 flex items-center justify-between">
            <span class="text-sm font-medium text-gray-800">${cat.label}</span>
            <span class="px-2 py-0.5 rounded-full text-xs font-medium ${cat.badge}">${count > 0 ? count + ' 处' : '无'}</span>
          </div>
          ${body}
        </div>`;
      }).join('');

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Copy report ─────────────────────────────────────────────────────────
    document.getElementById('copy-btn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(lastRawResult);
        const btn = document.getElementById('copy-btn');
        btn.textContent = '已复制 ✓';
        setTimeout(() => { btn.textContent = '复制完整报告'; }, 2000);
      } catch {
        alert('复制失败，请手动选择文本复制');
      }
    });
  </script>
</body>
</html>
