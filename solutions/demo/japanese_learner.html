<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語学習ツール · 千里同風</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    .jp { font-family: 'Noto Sans JP', system-ui, sans-serif; }
    ruby { ruby-align: center; }
    rt { font-size: 0.52em; color: #9ca3af; letter-spacing: 0.02em; }

    .tab-on  { background: #2563eb; color: #fff; }
    .tab-off { background: transparent; color: #6b7280; }
    .tab-off:hover { color: #374151; }

    .word-card-on  { border-color: #3b82f6; background: #eff6ff; }
    .word-card-off { border-color: #f3f4f6; background: #fff; }
    .word-card-off:hover { border-color: #d1d5db; }

    .conj-row:hover { background: #f9fafb; border-radius: 6px; }

    .ans-btn {
      transition: all .15s;
      border: 2px solid #e5e7eb;
      background: #fff;
      color: #374151;
    }
    .ans-btn:hover:not(:disabled) { border-color: #93c5fd; background: #eff6ff; }
    .ans-btn:disabled { cursor: default; }
    .ans-correct { border-color: #10b981 !important; background: #d1fae5 !important; color: #065f46 !important; }
    .ans-wrong   { border-color: #ef4444 !important; background: #fee2e2 !important; color: #991b1b !important; }
    .ans-show    { border-color: #10b981 !important; background: #d1fae5 !important; color: #065f46 !important; }
    .ans-dim     { border-color: #f3f4f6 !important; color: #9ca3af !important; }

    .fade-in { animation: fi .18s ease both; }
    @keyframes fi { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    .word-list-h { max-height: calc(100vh - 230px); }
    .detail-sticky { position: sticky; top: 72px; }

    /* ── Auth Gate form ── */
    .auth-input {
      display: block; width: 100%; padding: 10px 14px; margin-bottom: 10px;
      border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color .15s;
    }
    .auth-input:focus { border-color: #2563eb; }
    .auth-msg { font-size: 12px; min-height: 16px; margin-bottom: 10px; }
    .auth-msg.err { color: #ef4444; }
    .auth-msg.ok  { color: #10b981; }
    .auth-forgot {
      display: block; font-size: 12px; color: #9ca3af; background: none;
      border: none; cursor: pointer; font-family: inherit; margin-bottom: 10px;
    }
    .auth-forgot:hover { color: #6b7280; }

    /* ── Auth Gate ── */
    #auth-gate {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      align-items: center; justify-content: center;
      background: rgba(28,25,20,.72);
      backdrop-filter: blur(6px);
    }
    .auth-card {
      background: #fff; border-radius: 18px;
      padding: 52px 44px; max-width: 400px;
      width: calc(100% - 48px); text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
    }
    .auth-icon { font-size: 48px; margin-bottom: 20px; }
    .auth-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 20px; font-weight: 600;
      color: #1c1917; margin-bottom: 10px;
    }
    .auth-desc {
      font-size: 14px; color: #78716c;
      line-height: 1.85; margin-bottom: 28px;
    }
    .auth-btn {
      display: block; width: 100%; padding: 14px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 12px;
      font-size: 15px; font-family: inherit;
      cursor: pointer; margin-bottom: 10px;
    }
    .auth-back {
      display: block; font-size: 13px;
      color: #9ca3af; text-decoration: none;
    }
    .auth-back:hover { color: #6b7280; }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">

<!-- ══ Header ════════════════════════════════════════════════════ -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <a href="../demo.html" class="text-gray-400 hover:text-gray-600 text-sm flex-shrink-0">← 返回</a>
      <span class="text-gray-200">|</span>
      <span class="jp font-semibold text-gray-800 truncate">日語基礎学習ツール</span>
      <span class="hidden sm:inline text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded flex-shrink-0">词汇 · 变形 · 测试</span>
    </div>
    <!-- Tabs -->
    <div class="flex gap-1 bg-gray-100 rounded-lg p-1 flex-shrink-0">
      <button type="button" id="tab-learn" onclick="setTab('learn')"
        class="tab-on px-4 py-1.5 rounded-md text-sm font-medium transition-all">
        📖 学习
      </button>
      <button type="button" id="tab-quiz" onclick="setTab('quiz')"
        class="tab-off px-4 py-1.5 rounded-md text-sm font-medium transition-all">
        ✏️ 测试
      </button>
    </div>
    <!-- User area (shown after login) -->
    <div id="user-area" class="hidden items-center gap-2 flex-shrink-0">
      <span id="user-email" class="text-xs text-gray-400 hidden sm:block max-w-32 truncate"></span>
      <button type="button" id="logout-btn"
        class="text-xs px-2 py-1 rounded border border-gray-200 text-gray-400 hover:text-red-500 hover:border-red-200 transition-colors">
        退出
      </button>
    </div>
  </div>
</header>

<!-- ══ Main ══════════════════════════════════════════════════════ -->
<div class="max-w-6xl mx-auto px-4 py-5">

  <!-- ─── LEARN TAB ─────────────────────────────────────────── -->
  <div id="learn-view">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <!-- Left: Word List -->
      <div class="md:col-span-1 flex flex-col gap-3">
        <!-- Search -->
        <div class="relative">
          <input id="search-input" type="text" placeholder="搜索单词、罗马音…"
            oninput="onSearch(this.value)"
            class="w-full pl-8 pr-3 py-2 bg-white border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition">
          <span class="absolute left-2.5 top-2.5 text-gray-400 text-xs">🔍</span>
        </div>
        <!-- POS Filter -->
        <div id="pos-filter" class="flex flex-wrap gap-1.5"></div>
        <!-- Cards -->
        <div id="word-list" class="space-y-1.5 overflow-y-auto word-list-h"></div>
      </div>

      <!-- Right: Word Detail -->
      <div class="md:col-span-2">
        <div id="word-detail"
          class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 min-h-64 fade-in detail-sticky">
        </div>
      </div>

    </div>
  </div>

  <!-- ─── QUIZ TAB ───────────────────────────────────────────── -->
  <div id="quiz-view" class="hidden max-w-xl mx-auto">

    <!-- Mode Selector -->
    <div class="grid grid-cols-2 gap-2 mb-5">
      <button type="button" id="qm-meaning" onclick="setQuizMode('meaning')"
        class="py-2.5 rounded-xl text-sm font-medium border-2 transition-all border-blue-500 bg-blue-50 text-blue-700">
        🀄 词义辨析
      </button>
      <button type="button" id="qm-conjugation" onclick="setQuizMode('conjugation')"
        class="py-2.5 rounded-xl text-sm font-medium border-2 transition-all border-gray-200 bg-white text-gray-500">
        🔀 变形挑战
      </button>
    </div>

    <!-- Score Row -->
    <div class="flex items-center justify-between mb-4">
      <span id="score-text" class="text-sm text-gray-400">准备好了，开始！</span>
      <div id="score-dots" class="flex gap-1"></div>
    </div>

    <!-- Question Card -->
    <div id="question-card"
      class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-4 text-center min-h-36 flex flex-col items-center justify-center fade-in">
    </div>

    <!-- Answer Grid -->
    <div id="answer-options" class="grid grid-cols-2 gap-3 mb-4"></div>

    <!-- Feedback -->
    <div id="quiz-feedback" class="hidden mb-4"></div>

    <!-- Next Button -->
    <div class="flex justify-center">
      <button type="button" id="next-btn" onclick="nextQuestion()"
        class="hidden px-10 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium transition-colors">
        下一题 →
      </button>
    </div>

  </div>
</div>

<script src="japanese_learner.js"></script>

<!-- ══ Auth Gate Overlay ══════════════════════════════════════════ -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-icon">🔑</div>
    <h2 class="auth-title">会员专属功能</h2>
    <p class="auth-desc">此工具仅对受邀会员开放，请登录继续。</p>
    <input id="gate-email" type="email" class="auth-input" placeholder="邮箱地址" autocomplete="email">
    <input id="gate-password" type="password" class="auth-input" placeholder="密码" autocomplete="current-password">
    <div id="gate-msg" class="auth-msg"></div>
    <button type="button" class="auth-btn" id="gate-login-btn">登录</button>
    <button type="button" class="auth-forgot" id="gate-forgot-btn">忘记密码？</button>
    <a href="../demo.html" class="auth-back">← 返回演示页面</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, sendPasswordResetEmail }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

  const app = initializeApp({
    apiKey:            'AIzaSyCjtAqIrGkiqDiETUqxcmkhyBVoa2IHQNM',
    authDomain:        'senridfauthentication.firebaseapp.com',
    projectId:         'senridfauthentication',
    storageBucket:     'senridfauthentication.firebasestorage.app',
    messagingSenderId: '86494932585',
    appId:             '1:86494932585:web:185b8ed922cd491a63fcf8'
  });
  const auth = getAuth(app);

  function showGate()  { document.getElementById('auth-gate').style.display = 'flex'; }
  function hideGate()  { document.getElementById('auth-gate').style.display = 'none'; }
  function showUser(u) {
    document.getElementById('user-area').style.display = 'flex';
    document.getElementById('user-email').textContent = u.email;
  }
  function hideUser()  { document.getElementById('user-area').style.display = 'none'; }

  onAuthStateChanged(auth, user => {
    if (user) { hideGate(); showUser(user); }
    else { showGate(); hideUser(); }
  });

  function setMsg(text, type) {
    const el = document.getElementById('gate-msg');
    el.textContent = text;
    el.className = 'auth-msg' + (type ? ' ' + type : '');
  }

  document.getElementById('gate-login-btn').addEventListener('click', async () => {
    const email = document.getElementById('gate-email').value.trim();
    const password = document.getElementById('gate-password').value;
    setMsg('');
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch {
      setMsg('邮箱或密码错误，请重试。', 'err');
    }
  });

  document.getElementById('gate-forgot-btn').addEventListener('click', async () => {
    const email = document.getElementById('gate-email').value.trim();
    if (!email) { setMsg('请先填写邮箱地址。', 'err'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      setMsg('重置密码邮件已发送，请查收。', 'ok');
    } catch {
      setMsg('发送失败，请检查邮箱地址。', 'err');
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
