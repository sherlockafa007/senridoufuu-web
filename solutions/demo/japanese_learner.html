<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語動詞活用 · 千里同風</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Noto Sans SC',sans-serif}
.jp{font-family:'Noto Sans JP',sans-serif}
thead th{position:sticky;top:0;background:#fff;z-index:5;border-bottom:2px solid #e5e7eb;white-space:nowrap}
.c{cursor:pointer;color:transparent!important;background:#1e293b;border-radius:3px;-webkit-user-select:none;user-select:none;transition:background .15s}
.c:hover{background:#334155}
.c.open{color:#065f46!important;background:#d1fae5;cursor:pointer}
.tab-on{background:#2563eb!important;color:#fff!important}
.lang-on{background:#1D3D2D!important;color:#fff!important}
td,th{border:1px solid #e5e7eb}
.qopt{padding:10px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;background:#fff;transition:all .15s;width:100%}
.qopt:hover{background:#eff6ff;border-color:#93c5fd}
.qopt.ok{border-color:#10b981!important;background:#d1fae5!important;pointer-events:none}
.qopt.ng{border-color:#ef4444!important;background:#fee2e2!important;pointer-events:none}
.scroll-hint{display:none;text-align:center;font-size:11px;color:#9ca3af;padding:4px 0;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.speak-btn{display:inline-block;font-size:10px;opacity:0.35;cursor:pointer;padding:0 3px;border:none;background:none;vertical-align:middle;transition:opacity .15s;line-height:1}
.speak-btn:hover{opacity:1}
.fcheck-label{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;border:1.5px solid #e5e7eb;transition:all .15s;-webkit-user-select:none;user-select:none;font-family:'Noto Sans JP',sans-serif}
.fcheck-label.active{border-color:#7c3aed;background:#f5f3ff;color:#5b21b6;font-weight:500}
.col-label{display:inline-flex;align-items:center;font-size:11px;padding:4px 9px;border-radius:5px;cursor:pointer;border:1.5px solid #e5e7eb;transition:all .15s;-webkit-user-select:none;user-select:none;font-family:'Noto Sans JP',sans-serif;color:#6b7280}
.col-label.active{border-color:#2563eb;background:#eff6ff;color:#1d4ed8}
@media (max-width:640px){
  .scroll-hint{display:block}
  td,th{padding:4px 6px!important}
  .speak-btn{display:none}
}
/* Layout */
#colPanel{display:none}
#tableWrap{height:calc(100vh - 56px);overflow:auto}
/* Quiz Setup Modal */
#quizSetBox{display:none;position:fixed;inset:0;z-index:160;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.qs-box{background:#fff;border-radius:16px;padding:24px 20px;max-width:420px;width:calc(100% - 32px)}
#quizSetTitle{font-size:15px;font-weight:600;margin-bottom:14px;text-align:center;font-family:'Noto Sans JP',sans-serif}
#fmChecks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.qs-sel-row{display:flex;gap:10px;margin-bottom:16px;justify-content:center}
.qs-sel-btn{font-size:12px;color:#6b7280;border:none;background:none;cursor:pointer;text-decoration:underline}
.qs-sep{color:#d1d5db}
.qs-foot{display:flex;gap:8px}
#quizStartBtn{flex:1;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
#quizCancelBtn{padding:10px 16px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
/* Quiz Modal */
#quizBox{display:none;position:fixed;inset:0;z-index:150;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
.qb-box{background:#fff;border-radius:16px;padding:28px 24px;max-width:480px;width:calc(100% - 32px);text-align:center}
.qb-hdr{display:flex;align-items:center;margin-bottom:16px}
#qNum{font-size:12px;color:#6b7280;white-space:nowrap}
.qb-bar-wrap{flex:1;height:4px;background:#f3f4f6;border-radius:2px;margin:0 10px}
#qBar{height:100%;background:#7c3aed;border-radius:2px;transition:width .3s;width:5%}
.qb-close{font-size:20px;border:none;background:none;cursor:pointer;color:#9ca3af;line-height:1}
#qVerb{font-size:26px;font-weight:600;margin-bottom:6px}
#qMean{font-size:13px;color:#6b7280;margin-bottom:4px}
#qFormLine{font-size:13px;color:#374151;margin-bottom:18px}
#qOpts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#qResult{display:none;padding:16px 0}
#qEmoji{font-size:52px;margin-bottom:10px}
#qScore{font-size:22px;font-weight:600;margin-bottom:6px}
#qMsg{font-size:14px;color:#6b7280;margin-bottom:18px}
#quizAgainBtn{padding:10px 22px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-right:8px;font-family:inherit}
#quizCloseBtn{padding:10px 22px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
/* Status/Auth Gate overlays */
.gs-overlay{position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(28,25,20,.75);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
#gate-status{display:none}
#gate{display:flex}
.gs-box{background:#fff;border-radius:16px;padding:44px 36px;max-width:360px;width:calc(100% - 40px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
#gs-icon{font-size:38px;margin-bottom:14px}
#gs-title{font-size:17px;font-weight:600;margin-bottom:8px;font-family:'Noto Sans SC',sans-serif}
#gs-desc{font-size:13px;color:#78716c;line-height:1.8;margin-bottom:22px}
.gs-back{font-size:12px;color:#9ca3af;text-decoration:none}
.gs-icon-key{font-size:38px;margin-bottom:14px}
#authTitle{font-size:17px;font-weight:600;margin-bottom:8px;font-family:'Noto Sans SC',sans-serif}
#authDesc{font-size:13px;color:#78716c;line-height:1.8;margin-bottom:22px}
.gs-input{display:block;width:100%;padding:10px 12px;margin-bottom:8px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
#gm{font-size:12px;min-height:16px;margin-bottom:8px;color:#ef4444}
#glogin{display:block;width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;margin-bottom:8px}
#gforgot{display:block;background:none;border:none;font-size:12px;color:#9ca3af;cursor:pointer;font-family:inherit;margin-bottom:10px}
#authBack{font-size:12px;color:#9ca3af;text-decoration:none}
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-20 h-14">
  <div class="px-3 h-full flex items-center gap-1.5 flex-wrap overflow-hidden">
    <a href="../demo.html" id="backBtn" class="text-gray-400 hover:text-gray-600 text-sm shrink-0">← 返回</a>
    <span id="pageTitle" class="jp font-semibold text-gray-800 shrink-0 text-sm">日本語動詞活用</span>
    <div class="flex gap-1 ml-1 shrink-0">
      <button type="button" data-g="1" onclick="setG(1)" id="gBtn1" title="一类" class="tab-on px-2.5 py-1 rounded text-xs bg-gray-100 text-gray-600 transition-colors"></button>
      <button type="button" data-g="2" onclick="setG(2)" id="gBtn2" title="二类" class="px-2.5 py-1 rounded text-xs bg-gray-100 text-gray-600 transition-colors"></button>
      <button type="button" data-g="3" onclick="setG(3)" id="gBtn3" title="三类" class="px-2.5 py-1 rounded text-xs bg-gray-100 text-gray-600 transition-colors"></button>
      <button type="button" data-g="0" onclick="setG(0)" id="gBtnAll" title="全部" class="px-2.5 py-1 rounded text-xs bg-gray-100 text-gray-600 transition-colors"></button>
    </div>
    <button type="button" id="practBtn" onclick="togglePractice()" title="遮盖练习" class="px-2.5 py-1 rounded border border-gray-300 text-xs text-gray-600 hover:bg-gray-100 shrink-0 transition-colors"></button>
    <button type="button" onclick="openQuizSet()" id="quizBtn" title="小测试" class="px-2.5 py-1 rounded border border-purple-300 text-xs text-purple-600 hover:bg-purple-50 shrink-0 transition-colors"></button>
    <button type="button" onclick="toggleColPanel()" id="colSettingsBtn" title="列设置" class="px-2.5 py-1 rounded border border-gray-300 text-xs text-gray-600 hover:bg-gray-100 shrink-0 transition-colors"></button>
    <div class="flex gap-0.5 ml-auto shrink-0">
      <button type="button" onclick="setLang('ja')" id="lbja" class="px-2 py-1 rounded text-xs bg-gray-100 text-gray-500 transition-colors">日</button>
      <button type="button" onclick="setLang('zh')" id="lbzh" class="lang-on px-2 py-1 rounded text-xs bg-gray-100 text-gray-500 transition-colors">中</button>
      <button type="button" onclick="setLang('en')" id="lben" class="px-2 py-1 rounded text-xs bg-gray-100 text-gray-500 transition-colors">EN</button>
    </div>
    <div id="uarea" class="hidden items-center gap-2 shrink-0">
      <span id="uemail" class="text-xs text-gray-400 max-w-[120px] truncate hidden sm:block"></span>
      <button type="button" id="logoutBtn" title="退出" class="text-xs px-2 py-1 rounded border border-gray-200 text-gray-400 hover:text-red-500 hover:border-red-200 transition-colors"></button>
    </div>
  </div>
</header>

<div id="scrollHint" class="scroll-hint"></div>

<div id="colPanel" class="bg-white border-b border-gray-100 px-4 py-2.5">
  <div class="flex flex-wrap gap-1.5" id="colChecks"></div>
</div>

<div id="tableWrap">
  <table class="text-xs border-collapse w-full">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Quiz Setup Modal -->
<div id="quizSetBox">
  <div class="qs-box">
    <h3 id="quizSetTitle"></h3>
    <div id="fmChecks"></div>
    <div class="qs-sel-row">
      <button type="button" onclick="selectAllForms(true)" id="selAllBtn" title="全选" class="qs-sel-btn"></button>
      <span class="qs-sep">|</span>
      <button type="button" onclick="selectAllForms(false)" id="selNoneBtn" title="取消全选" class="qs-sel-btn"></button>
    </div>
    <div class="qs-foot">
      <button type="button" onclick="doStartQuiz()" id="quizStartBtn" title="开始测试"></button>
      <button type="button" onclick="document.getElementById('quizSetBox').style.display='none'" id="quizCancelBtn" title="取消"></button>
    </div>
  </div>
</div>

<!-- Quiz Modal -->
<div id="quizBox">
  <div class="qb-box">
    <div class="qb-hdr">
      <span id="qNum"></span>
      <div class="qb-bar-wrap"><div id="qBar"></div></div>
      <button type="button" onclick="document.getElementById('quizBox').style.display='none'" title="关闭" class="qb-close">×</button>
    </div>
    <div id="qVerb" class="jp"></div>
    <div id="qMean"></div>
    <div id="qFormLine"></div>
    <div id="qOpts"></div>
    <div id="qResult">
      <div id="qEmoji"></div>
      <div id="qScore"></div>
      <div id="qMsg"></div>
      <button type="button" onclick="openQuizSet()" id="quizAgainBtn" title="再来一次"></button>
      <button type="button" onclick="document.getElementById('quizBox').style.display='none'" id="quizCloseBtn" title="关闭"></button>
    </div>
  </div>
</div>

<!-- Status overlay for pending/disabled users -->
<div id="gate-status" class="gs-overlay">
  <div class="gs-box">
    <div id="gs-icon"></div>
    <h2 id="gs-title"></h2>
    <p id="gs-desc"></p>
    <a href="/account.html" class="gs-back">← 返回账号页面</a>
  </div>
</div>

<!-- Auth Gate -->
<div id="gate" class="gs-overlay">
  <div class="gs-box">
    <div class="gs-icon-key">🔑</div>
    <h2 id="authTitle"></h2>
    <p id="authDesc"></p>
    <input id="ge" type="email" class="gs-input" title="邮箱地址" placeholder="邮箱地址">
    <input id="gp" type="password" class="gs-input" title="密码" placeholder="密码">
    <div id="gm"></div>
    <button type="button" id="glogin" title="登录"></button>
    <button type="button" id="gforgot" title="忘记密码"></button>
    <a href="../demo.html" id="authBack" title="返回"></a>
  </div>
</div>

let lang = localStorage.getItem('jl_lang') || 'zh';

function applyLang() {
  const t = T[lang];
  document.getElementById('backBtn').textContent = t.back;
  document.getElementById('pageTitle').textContent = t.title;
  document.getElementById('gBtn1').textContent = t.g1;
  document.getElementById('gBtn2').textContent = t.g2;
  document.getElementById('gBtn3').textContent = t.g3;
  document.getElementById('gBtnAll').textContent = t.gAll;
  document.getElementById('practBtn').textContent = mode ? t.practOff : t.practOn;
  document.getElementById('quizBtn').textContent = t.quiz;
  document.getElementById('colSettingsBtn').textContent = t.colSettings;
  document.getElementById('logoutBtn').textContent = t.logout;
  document.getElementById('scrollHint').textContent = t.scrollHint;
  document.getElementById('quizSetTitle').textContent = t.quizSetTitle;
  document.getElementById('selAllBtn').textContent = t.selAll;
  document.getElementById('selNoneBtn').textContent = t.selNone;
  document.getElementById('quizStartBtn').textContent = t.quizStart;
  document.getElementById('quizCancelBtn').textContent = t.quizCancel;
  document.getElementById('quizAgainBtn').textContent = t.quizAgain;
  document.getElementById('quizCloseBtn').textContent = t.quizClose;
  document.getElementById('authTitle').textContent = t.authTitle;
  document.getElementById('authDesc').textContent = t.authDesc;
  document.getElementById('ge').placeholder = t.authEmail;
  document.getElementById('gp').placeholder = t.authPass;
  document.getElementById('glogin').textContent = t.authLogin;
  document.getElementById('gforgot').textContent = t.authForgot;
  document.getElementById('authBack').textContent = t.authBack;
  ['ja','zh','en'].forEach(l => document.getElementById('lb'+l).classList.toggle('lang-on', l === lang));
  buildColPanel();
  buildThead();
  render();
}

function setLang(l) {
  lang = l;
  localStorage.setItem('jl_lang', l);
  applyLang();
}

// ── Conjugation ───────────────────────────────────────────────────────────────
const MP={
  'う':{i:'い',a:'わ',e:'え',o:'お',te:'って',ta:'った'},
  'く':{i:'き',a:'か',e:'け',o:'こ',te:'いて',ta:'いた'},
  'ぐ':{i:'ぎ',a:'が',e:'げ',o:'ご',te:'いで',ta:'いだ'},
  'す':{i:'し',a:'さ',e:'せ',o:'そ',te:'して',ta:'した'},
  'つ':{i:'ち',a:'た',e:'て',o:'と',te:'って',ta:'った'},
  'ぬ':{i:'に',a:'な',e:'ね',o:'の',te:'んで',ta:'んだ'},
  'ぶ':{i:'び',a:'ば',e:'べ',o:'ぼ',te:'んで',ta:'んだ'},
  'む':{i:'み',a:'ま',e:'め',o:'も',te:'んで',ta:'んだ'},
  'る':{i:'り',a:'ら',e:'れ',o:'ろ',te:'って',ta:'った'}
};

function cj(v) {
  const {b,g,sp} = v;
  if (g===3) {
    if (b==='来る'||b==='くる') return {masu:'きます',te:'きて',nai:'こない',ta:'きた',vol:'こよう',ba:'くれば',imp:'こい',pot:'こられる',pass:'こられる',caus:'こさせる'};
    const st = b.endsWith('する') ? b.slice(0,-2) : '';
    return {masu:st+'します',te:st+'して',nai:st+'しない',ta:st+'した',vol:st+'しよう',ba:st+'すれば',imp:st+'しろ',pot:st+'できる',pass:st+'される',caus:st+'させる'};
  }
  if (g===2) {
    const s = b.slice(0,-1);
    return {masu:s+'ます',te:s+'て',nai:s+'ない',ta:s+'た',vol:s+'よう',ba:s+'れば',imp:s+'ろ',pot:s+'られる',pass:s+'られる',caus:s+'させる'};
  }
  const e = b.slice(-1), s = b.slice(0,-1), m = MP[e];
  return {
    masu:s+m.i+'ます', te:s+(sp?'って':m.te), nai:s+m.a+'ない', ta:s+(sp?'った':m.ta),
    vol:s+m.o+'う', ba:s+m.e+'ば', imp:s+m.e, pot:s+m.e+'る', pass:s+m.a+'れる', caus:s+m.a+'せる'
  };
}

// ── Column Visibility ─────────────────────────────────────────────────────────
const FKEY = ['masu','te','nai','ta','vol','ba','imp','pot','pass','caus'];
const COLS = ['zh','en',...FKEY];
const JP_COLS = new Set(FKEY);
let hiddenCols = new Set(JSON.parse(localStorage.getItem('jl_hidden_cols') || '[]'));

function toggleCol(key, visible) {
  if (visible) hiddenCols.delete(key); else hiddenCols.add(key);
  localStorage.setItem('jl_hidden_cols', JSON.stringify([...hiddenCols]));
  buildColPanel();
  buildThead();
  render();
}

function buildColPanel() {
  const th = T[lang].th;
  document.getElementById('colChecks').innerHTML = COLS.map(key => {
    const on = !hiddenCols.has(key);
    return `<label class="col-label ${on ? 'active' : ''}">
      <input type="checkbox" ${on ? 'checked' : ''} onchange="toggleCol('${key}',this.checked)" style="display:none">
      ${th[key]}
    </label>`;
  }).join('');
}

function toggleColPanel() {
  const p = document.getElementById('colPanel');
  const opening = p.style.display === 'none';
  p.style.display = opening ? 'block' : 'none';
  updateTableHeight();
}

function updateTableHeight() {
  const p = document.getElementById('colPanel');
  const ph = p.style.display !== 'none' ? p.offsetHeight : 0;
  const sh = document.getElementById('scrollHint').offsetHeight;
  document.getElementById('tableWrap').style.height = `calc(100vh - 56px - ${ph + sh}px)`;
}

// ── Pronunciation ─────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

// ── Render ────────────────────────────────────────────────────────────────────
let mode = false, grp = 1;

function tc(text) {
  const safe = text.replace(/"/g, '&quot;');
  if (mode) return `<td class="px-2 py-1.5 jp c" onclick="revealCell(this)" data-val="${safe}">${text}</td>`;
  return `<td class="px-2 py-1.5 jp text-gray-700" onclick="speak('${safe}')" style="cursor:pointer" title="🔊">${text}</td>`;
}

function revealCell(el) {
  el.classList.toggle('open');
  if (el.classList.contains('open')) speak(el.dataset.val);
}

function tcol(key, text) {
  if (hiddenCols.has(key)) return '';
  if (key === 'zh') return `<td class="px-2 py-1.5 text-gray-600 whitespace-nowrap">${text}</td>`;
  if (key === 'en') return `<td class="px-2 py-1.5 text-gray-400 whitespace-nowrap">${text}</td>`;
  return tc(text);
}

function buildThead() {
  const th = T[lang].th;
  let html = `<tr class="text-gray-500 font-medium">
    <th class="px-2 py-2 text-left w-7">${th.num}</th>
    <th class="px-2 py-2 text-left jp">${th.base}</th>`;
  for (const key of COLS) {
    if (!hiddenCols.has(key)) html += `<th class="px-2 py-2 text-left${JP_COLS.has(key) ? ' jp' : ''}">${th[key]}</th>`;
  }
  html += '</tr>';
  document.getElementById('thead').innerHTML = html;
}

function render() {
  const list = grp === 0 ? V : V.filter(v => v.g === grp);
  const bg = {1:'bg-blue-50', 2:'bg-green-50', 3:'bg-purple-50'};
  document.getElementById('tbody').innerHTML = list.map((v, i) => {
    const c = cj(v);
    return `<tr class="${bg[v.g]} border-b border-gray-100 hover:brightness-95">
      <td class="px-2 py-1.5 text-gray-400">${i+1}</td>
      <td class="px-2 py-1.5 jp font-medium text-gray-800 whitespace-nowrap">
        ${v.b}<span class="text-gray-400 font-normal ml-1">(${v.r})</span>
        <button class="speak-btn" onclick="speak('${v.r.replace(/'/g,"\\'")}');event.stopPropagation()" tabindex="-1">🔊</button>
      </td>
      ${tcol('zh',v.m)}${tcol('en',v.e||'')}
      ${tcol('masu',c.masu)}${tcol('te',c.te)}${tcol('nai',c.nai)}${tcol('ta',c.ta)}
      ${tcol('vol',c.vol)}${tcol('ba',c.ba)}${tcol('imp',c.imp)}${tcol('pot',c.pot)}
      ${tcol('pass',c.pass)}${tcol('caus',c.caus)}
    </tr>`;
  }).join('');
}

function setG(g) {
  grp = g;
  document.querySelectorAll('[data-g]').forEach(b => b.classList.remove('tab-on'));
  document.querySelector(`[data-g="${g}"]`).classList.add('tab-on');
  render();
}

function togglePractice() {
  mode = !mode;
  const b = document.getElementById('practBtn');
  const t = T[lang];
  b.textContent = mode ? t.practOff : t.practOn;
  b.style.background = mode ? '#4f46e5' : '';
  b.style.color = mode ? '#fff' : '';
  b.style.borderColor = mode ? '#4f46e5' : '';
  render();
}

    const on = selectedForms.includes(key);
    return `<label class="fcheck-label ${on ? 'active' : ''}">
      <input type="checkbox" data-fkey="${key}" ${on ? 'checked' : ''} style="display:none"
        onchange="toggleForm('${key}',this.checked,this.parentElement)">
      ${t.FNAME[key]}
    </label>`;
  }).join('');
  document.getElementById('quizSetBox').style.display = 'flex';
}

function toggleForm(key, checked, label) {
  if (checked) { if (!selectedForms.includes(key)) selectedForms.push(key); }
  else { selectedForms = selectedForms.filter(k => k !== key); }
  label.classList.toggle('active', checked);
  localStorage.setItem('jl_quiz_forms', JSON.stringify(selectedForms));
}

function selectAllForms(all) {
  selectedForms = all ? [...FKEY] : [];
  localStorage.setItem('jl_quiz_forms', JSON.stringify(selectedForms));
  document.querySelectorAll('#fmChecks input[type=checkbox]').forEach(cb => {
    cb.checked = all;
    cb.parentElement.classList.toggle('active', all);
  });
}

function doStartQuiz() {
  if (selectedForms.length === 0) return;
  document.getElementById('quizSetBox').style.display = 'none';
  const fkeys = selectedForms;
  const pool = grp === 0 ? V : V.filter(v => v.g === grp);
  const sh = [...pool].sort(() => Math.random() - 0.5).slice(0, 20);
  quizQ = sh.map(v => {
    const f = fkeys[Math.floor(Math.random() * fkeys.length)];
    const cor = cj(v)[f];
    const allF = cj(v);
    const wrongs = [...new Set(FKEY.filter(k => k !== f && allF[k] !== cor).sort(() => Math.random() - 0.5).map(k => allF[k]))].slice(0, 3);
    return {v, f, fname: T[lang].FNAME[f], cor, opts: [cor, ...wrongs].sort(() => Math.random() - 0.5)};
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizBox').style.display = 'flex';
  document.getElementById('qResult').style.display = 'none';
  document.getElementById('qOpts').style.display = 'grid';
  showQ();
}

function showQ() {
  const q = quizQ[quizIdx];
  const total = quizQ.length;
  document.getElementById('qNum').textContent = `${quizIdx+1}/${total}`;
  document.getElementById('qBar').style.width = `${(quizIdx/total)*100+5}%`;
  document.getElementById('qVerb').textContent = `${q.v.b}（${q.v.r}）`;
  document.getElementById('qMean').textContent = `${q.v.m}${q.v.e ? ' / '+q.v.e : ''}`;
  const t = T[lang];
  document.getElementById('qFormLine').innerHTML = `${t.quizQ} <b style="color:#7c3aed">${q.fname}</b>`;
  document.getElementById('qOpts').innerHTML = q.opts.map(o =>
    `<button type="button" class="qopt jp" onclick="pickAns(this,'${o.replace(/'/g,"\\'")}','${q.cor.replace(/'/g,"\\'")}')">` + o + `</button>`
  ).join('');
}

function pickAns(el, ans, cor) {
  document.querySelectorAll('.qopt').forEach(b => {
    b.onclick = null;
    if (b.textContent.trim() === cor) b.classList.add('ok');
  });
  if (ans !== cor) el.classList.add('ng');
  if (ans === cor) quizScore++;
  speak(cor);
  setTimeout(() => { quizIdx++; if (quizIdx >= quizQ.length) showResult(); else showQ(); }, 900);
}

function showResult() {
  document.getElementById('qOpts').style.display = 'none';
  document.getElementById('qResult').style.display = 'block';
  ['qNum','qVerb','qMean','qFormLine'].forEach(id => document.getElementById(id).textContent = '');
  document.getElementById('qBar').style.width = '100%';
  const t = T[lang];
  const total = quizQ.length;
  const ratio = quizScore / total;
  const [emoji, msg] = ratio > 0.75 ? ['🎉', t.quizGreat] : ratio >= 0.5 ? ['💪', t.quizGood] : ['😅', t.quizBad];
  document.getElementById('qEmoji').textContent = emoji;
  document.getElementById('qScore').textContent = `${quizScore} / ${total}`;
  document.getElementById('qMsg').textContent = msg;
}

// ── Init ──────────────────────────────────────────────────────────────────────
applyLang();
updateTableHeight();
window.addEventListener('resize', updateTableHeight);
</script>
