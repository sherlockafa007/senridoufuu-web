<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 · 千里同風</title>
<script src="https://cdn.tailwindcss.com/3.4.16"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+SC:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
.jp { font-family: 'Noto Sans JP', sans-serif; }
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px 24px; }
.stat-val { font-size: 2rem; font-weight: 600; line-height: 1; margin-bottom: 4px; }
.bar { height: 8px; border-radius: 4px; background: #dbeafe; }
.bar-fill { height: 100%; border-radius: 4px; background: #3b82f6; transition: width .4s; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
.tag-mobile { background: #fef3c7; color: #92400e; }
.tag-desktop { background: #ede9fe; color: #5b21b6; }
/* Auth overlays */
.ag-overlay { position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(28,25,20,.8); }
#gate { display:flex;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px); }
#noPerm { display:none; }
.ag-box { background:#fff;border-radius:16px;padding:44px 36px;text-align:center; }
.ag-box--login { max-width:360px;width:calc(100% - 40px);box-shadow:0 20px 60px rgba(0,0,0,.25); }
.ag-box--noperm { max-width:340px;width:calc(100% - 40px); }
.ag-icon { font-size:36px;margin-bottom:14px; }
.ag-title { font-weight:600; }
.ag-title--login { font-size:17px;margin-bottom:6px; }
.ag-title--noperm { font-size:16px;margin-bottom:8px; }
.ag-desc { font-size:13px;color:#9ca3af; }
.ag-desc--login { margin-bottom:22px; }
.ag-desc--noperm { margin-bottom:20px; }
.ag-input { display:block;width:100%;padding:10px 12px;margin-bottom:8px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;font-family:inherit; }
.ag-error { font-size:12px;min-height:16px;margin-bottom:8px;color:#ef4444; }
.ag-btn-login { display:block;width:100%;padding:12px;background:#1e293b;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit; }
.ag-btn-noperm { padding:10px 24px;background:#f3f4f6;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer; }
#dashboard { display:none; }
.tbl-scroll { overflow-x:auto; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 h-14 flex items-center px-6 sticky top-0 z-10">
  <div class="flex items-center gap-3 flex-1">
    <a href="/" class="text-gray-300 font-light text-lg hover:text-gray-600 transition-colors" title="返回主页">千里同風</a>
    <span class="text-gray-200">·</span>
    <span class="text-gray-700 font-medium text-sm">管理后台 · 运行监控</span>
    <span id="lastRefresh" class="text-gray-400 text-xs ml-2"></span>
  </div>
  <div class="flex items-center gap-3">
    <a href="/admin/" class="text-xs px-3 py-1.5 rounded border border-blue-200 text-blue-500 hover:bg-blue-50 transition-colors">✎ 内容编辑</a>
    <a href="/admin/blog/" class="text-xs px-3 py-1.5 rounded border border-blue-200 text-blue-500 hover:bg-blue-50 transition-colors">✍ Blog</a>
    <button onclick="loadData()" type="button" id="refreshBtn" class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">↻ 刷新</button>
    <span id="adminEmail" class="text-xs text-gray-400 hidden sm:block"></span>
    <button id="logoutBtn" type="button" class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-400 hover:text-red-500 hover:border-red-200 transition-colors">退出</button>
  </div>
</header>

<!-- Auth Gate -->
<div id="gate" class="ag-overlay">
  <div class="ag-box ag-box--login">
    <div class="ag-icon">🔐</div>
    <h2 class="ag-title ag-title--login">管理员登录</h2>
    <p class="ag-desc ag-desc--login">仅限授权管理员访问</p>
    <input id="ge" type="email" placeholder="邮箱地址" class="ag-input">
    <input id="gp" type="password" placeholder="密码" class="ag-input">
    <div id="gm" class="ag-error"></div>
    <button id="glogin" type="button" class="ag-btn-login">登录</button>
  </div>
</div>

<!-- No Permission -->
<div id="noPerm" class="ag-overlay">
  <div class="ag-box ag-box--noperm">
    <div class="ag-icon">🚫</div>
    <h2 class="ag-title ag-title--noperm">无访问权限</h2>
    <p class="ag-desc ag-desc--noperm">此页面仅限管理员查看。</p>
    <button id="noPermLogout" type="button" class="ag-btn-noperm">退出登录</button>
  </div>
</div>

<!-- Loading -->
<div id="loading" class="flex items-center justify-center h-64">
  <div class="text-gray-400 text-sm">加载中...</div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="max-w-5xl mx-auto px-4 py-6">

  <!-- Users Management -->
  <div class="card mb-6">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-medium text-gray-700">用户管理</div>
      <button onclick="loadUsers()" type="button" class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">↻ 刷新</button>
    </div>
    <div id="userList">
      <div class="text-gray-400 text-xs py-2">加载中…</div>
    </div>
  </div>

  <!-- Scrape Status -->
  <div class="card mb-6">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-medium text-gray-700">招标抓取监控</div>
      <div class="flex items-center gap-2">
        <span id="scrapeWhen" class="text-xs text-gray-400"></span>
        <button onclick="loadScrapeStatus()" type="button" class="text-xs px-3 py-1.5 rounded border border-gray-200 text-gray-500 hover:bg-gray-50 transition-colors">↻ 刷新</button>
      </div>
    </div>
    <div id="scrapeReport">
      <div class="text-gray-400 text-xs py-2">加载中…</div>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="grid grid-cols-2 sm:grid-cols-5 gap-4 mb-6">
    <div class="card">
      <div class="text-xs text-gray-400 mb-2">总访问次数</div>
      <div class="stat-val text-gray-800" id="st-total">—</div>
    </div>
    <div class="card">
      <div class="text-xs text-gray-400 mb-2">会员访问</div>
      <div class="stat-val text-blue-600" id="st-users">—</div>
    </div>
    <div class="card">
      <div class="text-xs text-gray-400 mb-2">匿名访问</div>
      <div class="stat-val text-orange-500" id="st-anon">—</div>
    </div>
    <div class="card">
      <div class="text-xs text-gray-400 mb-2">今日访问</div>
      <div class="stat-val text-green-600" id="st-today">—</div>
    </div>
    <div class="card">
      <div class="text-xs text-gray-400 mb-2">本周访问</div>
      <div class="stat-val text-purple-600" id="st-week">—</div>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">

    <!-- Per-Page Stats -->
    <div class="card">
      <div class="text-sm font-medium text-gray-700 mb-4">各页面访问</div>
      <div id="byPage" class="space-y-3"></div>
    </div>

    <!-- Per-User Stats -->
    <div class="card">
      <div class="text-sm font-medium text-gray-700 mb-4">各用户访问</div>
      <div id="byUser" class="space-y-3"></div>
    </div>

  </div>

  <!-- Recent Visits Table -->
  <div class="card">
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm font-medium text-gray-700">最近访问记录</div>
      <div class="text-xs text-gray-400" id="recCount"></div>
    </div>
    <div class="tbl-scroll">
      <table class="w-full text-xs">
        <thead>
          <tr class="text-gray-400 border-b border-gray-100">
            <th class="text-left pb-2 font-medium pr-4">时间</th>
            <th class="text-left pb-2 font-medium pr-4">用户</th>
            <th class="text-left pb-2 font-medium pr-4">页面</th>
            <th class="text-left pb-2 font-medium pr-4">停留</th>
            <th class="text-left pb-2 font-medium">设备</th>
          </tr>
        </thead>
        <tbody id="recTable" class="divide-y divide-gray-50"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
import { auth, db } from '/js/shared/firebase-init.js';
import { ADMINS } from '/js/shared/admins.js';
import {onAuthStateChanged,signInWithEmailAndPassword,signOut} from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import {collection,getDocs,query,orderBy,limit,doc,getDoc,updateDoc} from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

const PAGE_NAMES = {
  japanese_learner: '日本語動詞活用',
  translation: '中日翻訳ツール',
  analysis: '文書分析',
  lifestory: 'ライフストーリー',
  proofreader: '中文文稿校对',
};

// Firebase app/auth/db 来自 /js/shared/firebase-init.js

// ── Auth State ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async u => {
  if (!u) {
    showGate();
    return;
  }
  if (!ADMINS.includes(u.email)) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('noPerm').style.display = 'flex';
    return;
  }
  document.getElementById('gate').style.display = 'none';
  document.getElementById('adminEmail').textContent = u.email;
  loadUsers();
  loadScrapeStatus();
  await loadData();
});

// ── Load Data ─────────────────────────────────────────────────────────────────
window.loadData = async function() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('refreshBtn').textContent = '加载中…';

  try {
    const q = query(collection(db, 'visits'), orderBy('timestamp', 'desc'), limit(500));
    const snap = await getDocs(q);
    const docs = snap.docs.map(d => ({id: d.id, ...d.data()}));

    renderDashboard(docs);
    document.getElementById('lastRefresh').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
  } catch (err) {
    console.error(err);
    document.getElementById('loading').innerHTML = '<div class="text-red-400 text-sm">加载失败，请检查 Firestore 安全规则</div>';
  } finally {
    document.getElementById('refreshBtn').textContent = '↻ 刷新';
  }
};

function renderDashboard(docs) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // ── Stats ──────────────────────────────────────────────────────────────────
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekStart = new Date(todayStart - 6 * 86400000);

  const total = docs.length;
  const memberDocs = docs.filter(d => d.email);
  const anonCount = docs.filter(d => !d.email).length;
  const uniqueUsers = new Set(memberDocs.map(d => d.email)).size;
  const todayCount = docs.filter(d => d.timestamp?.toDate() >= todayStart).length;
  const weekCount = docs.filter(d => d.timestamp?.toDate() >= weekStart).length;

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-users').textContent = uniqueUsers;
  document.getElementById('st-anon').textContent = anonCount;
  document.getElementById('st-today').textContent = todayCount;
  document.getElementById('st-week').textContent = weekCount;

  // ── Per-Page ───────────────────────────────────────────────────────────────
  const byPage = {};
  docs.forEach(d => { byPage[d.page || 'unknown'] = (byPage[d.page || 'unknown'] || 0) + 1; });
  const maxPage = Math.max(...Object.values(byPage), 1);
  document.getElementById('byPage').innerHTML = Object.entries(byPage)
    .sort((a, b) => b[1] - a[1])
    .map(([page, cnt]) => `
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-gray-600">${PAGE_NAMES[page] || page}</span>
          <span class="text-gray-400 font-medium">${cnt}</span>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${(cnt/maxPage*100).toFixed(0)}%"></div></div>
      </div>`
    ).join('') || '<div class="text-xs text-gray-400">暂无数据</div>';

  // ── Per-User ───────────────────────────────────────────────────────────────
  const byUser = {};
  docs.forEach(d => { byUser[d.email || '匿名'] = (byUser[d.email || '匿名'] || 0) + 1; });
  const maxUser = Math.max(...Object.values(byUser), 1);
  document.getElementById('byUser').innerHTML = Object.entries(byUser)
    .sort((a, b) => b[1] - a[1])
    .map(([email, cnt]) => `
      <div>
        <div class="flex justify-between text-xs mb-1">
          <span class="text-gray-600 truncate max-w-[180px]" title="${email}">${email}</span>
          <span class="text-gray-400 font-medium">${cnt}</span>
        </div>
        <div class="bar" style="background:#dcfce7"><div class="bar-fill" style="width:${(cnt/maxUser*100).toFixed(0)}%;background:#22c55e"></div></div>
      </div>`
    ).join('') || '<div class="text-xs text-gray-400">暂无数据</div>';

  // ── Recent Table ───────────────────────────────────────────────────────────
  const shown = docs.slice(0, 100);
  document.getElementById('recCount').textContent = `最近 ${shown.length} 条 / 共 ${total} 条`;
  document.getElementById('recTable').innerHTML = shown.map(d => {
    const ts = d.timestamp?.toDate();
    const timeStr = ts ? ts.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    const deviceTag = d.device === 'mobile'
      ? '<span class="tag tag-mobile">手机</span>'
      : '<span class="tag tag-desktop">电脑</span>';
    const userLabel = d.email || `<span class="text-orange-400">${d.anonId || '匿名'}</span>`;
    const dur = d.duration != null ? (d.duration < 60 ? d.duration + 's' : Math.round(d.duration/60) + '分') : '—';
    return `<tr class="hover:bg-gray-50">
      <td class="py-2 pr-4 text-gray-400 whitespace-nowrap">${timeStr}</td>
      <td class="py-2 pr-4 text-gray-600 max-w-[160px] truncate" title="${d.email || d.anonId || ''}">${userLabel}</td>
      <td class="py-2 pr-4 text-gray-600 whitespace-nowrap">${PAGE_NAMES[d.page] || d.page || '—'}</td>
      <td class="py-2 pr-4 text-gray-400 whitespace-nowrap">${dur}</td>
      <td class="py-2">${deviceTag}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="py-4 text-center text-gray-400">暂无记录</td></tr>';
}

// ── Auth Gate ─────────────────────────────────────────────────────────────────
function showGate() {
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('loading').style.display = 'none';
}

function gm(txt, ok) {
  const e = document.getElementById('gm');
  e.textContent = txt;
  e.style.color = ok ? '#10b981' : '#ef4444';
}

document.getElementById('glogin').onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, document.getElementById('ge').value.trim(), document.getElementById('gp').value);
  } catch {
    gm('邮箱或密码错误，请重试。');
  }
};

document.getElementById('logoutBtn').onclick = () => signOut(auth);
document.getElementById('noPermLogout').onclick = () => signOut(auth);

// ── Users Management ──────────────────────────────────────────────────────────
window.loadUsers = async function() {
  const el = document.getElementById('userList');
  if (!el) return;
  el.innerHTML = '<div class="text-gray-400 text-xs py-2">加载中…</div>';
  try {
    const snap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc')));
    if (snap.empty) {
      el.innerHTML = '<div class="text-gray-400 text-xs py-2">暂无注册用户</div>';
      return;
    }
    el.innerHTML = snap.docs.map(d => {
      const u = d.data();
      const status = u.status || 'pending';
      const statusColor = status === 'approved' ? 'text-green-600' : status === 'disabled' ? 'text-red-500' : 'text-yellow-500';
      const statusLabel = status === 'approved' ? '已通过' : status === 'disabled' ? '已停用' : '待审核';
      const createdAt = u.createdAt?.toDate?.()?.toLocaleDateString('zh-CN') || '—';
      const approveBtn = status !== 'approved'
        ? `<button onclick="setUserStatus('${d.id}','approved')" class="text-xs px-2 py-1 rounded bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 transition-colors">通过</button>`
        : '';
      const toggleBtn = status !== 'disabled'
        ? `<button onclick="setUserStatus('${d.id}','disabled')" class="text-xs px-2 py-1 rounded bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 transition-colors ml-1">停用</button>`
        : `<button onclick="setUserStatus('${d.id}','pending')" class="text-xs px-2 py-1 rounded bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100 transition-colors ml-1">恢复</button>`;
      return `<div class="flex items-center justify-between py-2.5 border-b border-gray-50 last:border-0">
        <div>
          <div class="text-xs text-gray-700 font-medium">${u.email || '—'}</div>
          <div class="text-xs ${statusColor} mt-0.5">${statusLabel} · 注册于 ${createdAt}</div>
        </div>
        <div class="flex items-center gap-1">${approveBtn}${toggleBtn}</div>
      </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = `<div class="text-red-400 text-xs py-2">${err.message}</div>`;
  }
};

window.setUserStatus = async function(uid, status) {
  try {
    await updateDoc(doc(db, 'users', uid), { status });
    await loadUsers();
  } catch (err) {
    alert('操作失败：' + err.message);
  }
};

// ── Scrape Status (招标抓取监控) ────────────────────────────────────────────────
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

window.loadScrapeStatus = async function() {
  const el = document.getElementById('scrapeReport');
  const whenEl = document.getElementById('scrapeWhen');
  if (!el) return;
  el.innerHTML = '<div class="text-gray-400 text-xs py-2">加载中…</div>';
  try {
    const snap = await getDoc(doc(db, 'meta', 'scrape_status'));
    if (!snap.exists()) {
      whenEl.textContent = '';
      el.innerHTML = '<div class="text-gray-400 text-xs py-2">暂无抓取记录（下次定时任务运行后显示）</div>';
      return;
    }
    const r = snap.data();
    const t = r.finished_at?.toDate?.();
    const okBadge = r.ok
      ? '<span class="tag" style="background:#dcfce7;color:#15803d">成功</span>'
      : '<span class="tag" style="background:#fee2e2;color:#b91c1c">失败</span>';
    whenEl.innerHTML = (t ? '完成于 ' + t.toLocaleString('zh-CN') : '') + ' ' + okBadge;

    const tt = r.totals || {};
    const stat = (label, val, color) =>
      `<div class="text-center"><div class="text-xl font-semibold ${color || 'text-gray-800'}">${val ?? 0}</div><div class="text-xs text-gray-400 mt-0.5">${label}</div></div>`;
    const totalsHtml = `<div class="grid grid-cols-3 sm:grid-cols-6 gap-3 mb-4">
      ${stat('发现', tt.found)}
      ${stat('新增', tt.inserted, 'text-green-600')}
      ${stat('已结束', tt.closed, 'text-gray-500')}
      ${stat('重复跳过', tt.skipped_dup)}
      ${stat('非招标', tt.skipped_notbid, tt.skipped_notbid ? 'text-orange-500' : '')}
      ${stat('抓取失败', tt.failed_fetch, tt.failed_fetch ? 'text-red-500' : '')}
    </div>`;

    const sources = (r.sources || []).map(s => `
      <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0 text-xs">
        <div class="text-gray-700">${esc(s.city)} <span class="text-gray-400">${esc(s.category || '')}</span></div>
        <div class="flex items-center gap-3">
          <span class="text-gray-500">发现 ${s.found || 0}</span>
          <span class="text-green-600">新增 ${s.inserted || 0}</span>
          ${s.closed ? `<span class="text-gray-400">结束 ${s.closed}</span>` : ''}
          ${s.error ? `<span class="text-red-500" title="${esc(s.error)}">⚠ 失败</span>` : '<span class="text-green-500">✓</span>'}
        </div>
      </div>`).join('');

    el.innerHTML = totalsHtml + (sources || '<div class="text-gray-400 text-xs">无来源数据</div>');
  } catch (err) {
    whenEl.textContent = '';
    el.innerHTML = `<div class="text-red-400 text-xs py-2">读取失败：${esc(err.message)}（可能需在 Firestore 规则中允许管理员读取 meta 集合）</div>`;
  }
};
</script>
</body>
</html>
