<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生平故事 · 千里同風</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #faf8f4;
      --paper:  #ffffff;
      --text:   #2c2415;
      --text2:  #7a6845;
      --accent: #8b6914;
      --accentl:#f5ede0;
      --border: #e8ddd0;
      --red:    #c0392b;
      --r:      12px;
    }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .hdr { background: var(--paper); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .hdr-left { display: flex; align-items: center; gap: 14px; }
    .back { color: var(--text2); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--accent); }
    .hdr-title { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 600; }
    .hdr-prog { font-size: 13px; color: var(--text2); }
    .btn-gen { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; font-family: inherit; transition: opacity .2s; }
    .btn-gen:hover { opacity: .85; }
    .btn-gen:disabled { opacity: .35; cursor: default; }
    .prog-bar { height: 3px; background: var(--border); }
    .prog-fill { height: 100%; background: var(--accent); transition: width .5s ease; }

    /* ── Layout ── */
    .main { max-width: 680px; margin: 0 auto; padding: 44px 24px; }
    .sec { display: none; }
    .sec.on { display: block; }

    /* ── Welcome ── */
    .welcome { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 56px 44px; text-align: center; }
    .welcome-icon { font-size: 52px; margin-bottom: 22px; }
    .welcome-title { font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 700; margin-bottom: 16px; }
    .welcome-desc { font-size: 15px; line-height: 1.9; color: var(--text2); margin-bottom: 36px; }
    .btn-start { background: var(--accent); color: #fff; border: none; padding: 14px 40px; border-radius: 28px; font-size: 16px; cursor: pointer; font-family: inherit; }
    .btn-start:hover { opacity: .85; }
    .btn-view-story { display: block; margin: 14px auto 0; background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-view-story:hover { text-decoration: underline; }

    /* ── Loading ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 18px; color: var(--text2); font-size: 15px; }
    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Question ── */
    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .q-cat { background: var(--accentl); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .q-num { font-size: 13px; color: var(--text2); }
    .q-transition { font-size: 14px; color: var(--text2); font-style: italic; margin-bottom: 10px; line-height: 1.7; min-height: 20px; }
    .q-text { font-family: 'Noto Serif SC', serif; font-size: 21px; line-height: 1.8; margin-bottom: 26px; }
    .answer-box { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 14px; }
    .answer-ta { width: 100%; border: none; outline: none; font-family: 'Noto Sans SC', system-ui, sans-serif; font-size: 16px; line-height: 1.85; color: var(--text); background: transparent; resize: none; min-height: 120px; }
    .answer-ta::placeholder { color: var(--text2); opacity: .55; }
    .answer-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .btn-mic { display: flex; align-items: center; gap: 7px; background: none; border: 1px solid var(--border); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--text2); font-family: inherit; transition: all .2s; }
    .btn-mic:hover { border-color: var(--accent); color: var(--accent); }
    .btn-mic.rec { background: var(--red); border-color: var(--red); color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { opacity: .7; } }
    .mic-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .char-ct { font-size: 12px; color: var(--text2); }
    .char-hint { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; }
    .char-hint.short { background: #fef3f2; color: #d14040; }
    .char-hint.good { background: #f0fef0; color: #2e7d2e; }
    .char-hint.long { background: #fffbef; color: #b87e0b; }
    .char-hint.toolong { background: #fef2f2; color: #c0392b; }
    .q-foot { display: flex; align-items: center; justify-content: space-between; }
    .btn-skip { background: none; border: none; color: var(--text2); font-size: 14px; cursor: pointer; font-family: inherit; padding: 8px 0; }
    .btn-skip:hover { color: var(--text); }
    .btn-submit { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: 24px; font-size: 15px; cursor: pointer; font-family: inherit; transition: opacity .2s; }
    .btn-submit:hover { opacity: .85; }
    .err { background: #fdf0ef; border: 1px solid #f5c6c2; border-radius: 8px; padding: 13px 18px; color: var(--red); margin-bottom: 14px; font-size: 14px; }

    /* ── Soft Landing ── */
    .soft-card { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 48px 44px; text-align: center; }
    .soft-icon { font-size: 36px; margin-bottom: 18px; }
    .soft-msg { font-family: 'Noto Serif SC', serif; font-size: 18px; line-height: 1.9; color: var(--text2); margin-bottom: 32px; max-width: 440px; margin-left: auto; margin-right: auto; }
    .btn-continue { background: var(--accent); color: #fff; border: none; padding: 12px 32px; border-radius: 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-continue:hover { opacity: .85; }

    /* ── Between ── */
    .between { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 44px; text-align: center; }
    .between-title { font-family: 'Noto Serif SC', serif; font-size: 22px; margin-bottom: 10px; }
    .between-desc { color: var(--text2); margin-bottom: 26px; line-height: 1.75; }
    .between-list { text-align: left; margin-bottom: 28px; }
    .between-item { border-left: 3px solid var(--accentl); padding: 8px 12px; margin-bottom: 8px; font-size: 14px; }
    .between-q { color: var(--text2); font-size: 12px; margin-bottom: 3px; }
    .between-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-more { background: var(--accent); color: #fff; border: none; padding: 12px 28px; border-radius: 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-more:hover { opacity: .85; }
    .btn-rest { background: none; border: 1px solid var(--border); color: var(--text2); padding: 12px 28px; border-radius: 24px; font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-rest:hover { border-color: var(--text); color: var(--text); }

    /* ── Story ── */
    .story-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .story-hdr-title { font-family: 'Noto Serif SC', serif; font-size: 21px; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--text2); padding: 8px 18px; border-radius: 20px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .btn-back:hover { border-color: var(--text); color: var(--text); }
    .story-body { background: var(--paper); border: 1px solid var(--border); border-radius: var(--r); padding: 52px 48px; font-family: 'Noto Serif SC', serif; font-size: 17px; line-height: 1.95; }
    .story-body h2 { font-size: 19px; color: var(--accent); margin: 34px 0 14px; font-weight: 600; }
    .story-body h2:first-child { margin-top: 0; }
    .story-body p { margin-bottom: 16px; }

    /* ── Actions ── */
    .action-btns { position: fixed; bottom: 18px; right: 18px; display: flex; gap: 8px; flex-direction: column; }
    .action-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: inherit; opacity: .4; transition: opacity .2s; }
    .action-btn:hover { opacity: 1; }

    .hidden { display: none !important; }
    .prog-fill-init { width: 0%; }

    @media (max-width: 600px) {
      .main { padding: 24px 16px; }
      .welcome, .soft-card, .between { padding: 36px 24px; }
      .story-body { padding: 28px 20px; }
      .q-text { font-size: 18px; }
    }

    @media (max-width: 480px) {
      .hdr { padding: 10px 14px; }
      .hdr-title { font-size: 15px; }
      .hdr-prog { display: none; }
      .btn-gen { padding: 7px 14px; font-size: 13px; }

      .welcome { padding: 28px 18px; }
      .welcome-title { font-size: 22px; }
      .welcome-desc { font-size: 14px; }
      .btn-start { padding: 12px 32px; font-size: 15px; }

      .story-hdr { flex-direction: column; gap: 12px; align-items: flex-start; }

      .between-btns { flex-direction: column; }
      .btn-more, .btn-rest { width: 100%; text-align: center; }

      .q-foot { flex-direction: column-reverse; gap: 10px; align-items: stretch; }
      .btn-submit { text-align: center; }

      .action-btns { bottom: 12px; right: 12px; flex-direction: row; }
    }
    #auth-gate { position:fixed;inset:0;background:#faf9f7;display:flex;align-items:center;justify-content:center;z-index:9999; }
    .ag-center { text-align:center; }
    .ag-spinner { width:28px;height:28px;border:2px solid #e5e7eb;border-top-color:#a87c4f;border-radius:50%;animation:ag-s .8s linear infinite;margin:0 auto; }
    .ag-text { color:#9ca3af;font-size:13px;margin-top:12px;font-family:sans-serif; }
    #char-hint,#import-file { display:none; }
    .privacy-label { display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--text2);cursor:pointer; }
    .privacy-label input[type="checkbox"] { cursor:pointer; }
  </style>
</head>
<body>
<div id="auth-gate"><div class="ag-center"><div class="ag-spinner"></div><p class="ag-text">验证身份中…</p></div></div>
<style>@keyframes ag-s{to{transform:rotate(360deg)}}</style>

<header class="hdr">
  <div class="hdr-left">
    <a href="../demo.html" class="back">← 返回</a>
    <span class="hdr-title">生平故事</span>
    <span class="hdr-prog" id="hdr-prog"></span>
  </div>
  <button type="button" class="btn-gen" id="btn-gen" onclick="confirmGenStory()" disabled>生成我的故事</button>
</header>
<div class="prog-bar"><div class="prog-fill prog-fill-init" id="prog-fill"></div></div>

<main class="main">

  <!-- 欢迎 -->
  <section class="sec on" id="sec-welcome">
    <div class="welcome">
      <div class="welcome-icon">📖</div>
      <h1 class="welcome-title" id="w-title">记录你的故事</h1>
      <p class="welcome-desc" id="w-desc">
        我会提出一些问题，你用文字或语音回答。<br>
        不需要一次说完，随时可以停下来。<br>
        当你觉得够了，AI 会为你写出一篇传记。
      </p>
      <button type="button" class="btn-start" id="btn-start" onclick="nextTurn(null)">开始 →</button>
      <button type="button" class="btn-view-story hidden" id="btn-prev-story" onclick="showPrevStory()">查看上次的故事</button>
    </div>
  </section>

  <!-- 分析中 -->
  <section class="sec" id="sec-loading">
    <div class="loading">
      <div class="spinner"></div>
      <span id="loading-msg">正在思考下一个问题…</span>
    </div>
  </section>

  <!-- 答题 -->
  <section class="sec" id="sec-q">
    <div class="q-meta">
      <span class="q-cat" id="q-cat"></span>
      <span class="q-num" id="q-num"></span>
    </div>
    <p class="q-transition" id="q-transition"></p>
    <p class="q-text" id="q-text"></p>
    <div class="answer-box">
      <textarea class="answer-ta" id="q-ta" placeholder="在这里写下你的回答…" rows="5"></textarea>
      <div class="char-hint" id="char-hint"></div>
      <div class="answer-foot">
        <button type="button" class="btn-mic" id="btn-mic" onclick="toggleVoice()">
          <span class="mic-dot"></span>
          <span id="mic-lbl">语音输入</span>
        </button>
        <span class="char-ct" id="char-ct">0 字</span>
      </div>
      <label class="privacy-label">
        <input type="checkbox" id="privacy-chk"> 🔒 标记为隐私，不分析
      </label>
    </div>
    <div id="q-err"></div>
    <div class="q-foot">
      <button type="button" class="btn-skip" onclick="skipCurrent()">跳过这题</button>
      <button type="button" class="btn-submit" onclick="submitAnswer()">提交回答 →</button>
    </div>
  </section>

  <!-- 软着陆（拒答引导） -->
  <section class="sec" id="sec-soft">
    <div class="soft-card">
      <div class="soft-icon">○</div>
      <p class="soft-msg" id="soft-msg"></p>
      <button type="button" class="btn-continue" onclick="nextTurn(null)">继续 →</button>
    </div>
  </section>

  <!-- 本轮结束 -->
  <section class="sec" id="sec-between">
    <div class="between">
      <div class="between-title" id="bw-title">这段到这里</div>
      <p class="between-desc" id="bw-desc"></p>
      <div class="between-list" id="bw-list"></div>
      <div class="between-btns">
        <button type="button" class="btn-more" onclick="nextTurn(null)">继续回答</button>
        <button type="button" class="btn-rest" onclick="restForNow()">先到这里</button>
      </div>
    </div>
  </section>

  <!-- 故事 -->
  <section class="sec" id="sec-story">
    <div class="story-hdr">
      <h2 class="story-hdr-title">我的生平故事</h2>
      <button type="button" class="btn-back" onclick="backFromStory()">← 返回</button>
    </div>
    <div id="story-wrap"></div>
  </section>

</main>

<div class="action-btns">
  <button type="button" class="action-btn" onclick="exportData()" title="导出所有数据为 JSON">导出</button>
  <button type="button" class="action-btn" onclick="document.getElementById('import-file').click()" title="从 JSON 文件恢复数据">导入</button>
  <button type="button" class="action-btn" onclick="resetAll()" title="清除所有数据，无法恢复">重置</button>
</div>
<input type="file" id="import-file" accept=".json" onchange="importData(event)">

<script>
// ══════════════════════════════════════════════════════════════════════════════
// 问题库
// ══════════════════════════════════════════════════════════════════════════════

// 锚点题 — 覆盖人生大轮廓的必答骨架（按优先级排列）
const ANCHORS = [
  { id:'a01', cat:'起点',     text:'你是在哪里长大的？那个地方，塑造了你性格里的哪些东西？' },
  { id:'a02', cat:'家人',     text:'家里谁对你影响最深？那种影响，你现在还能感受到吗？' },
  { id:'a03', cat:'成长',     text:'成长过程中，有没有某件具体的事，让你意识到"世界和我想的不一样"？' },
  { id:'a04', cat:'职业',     text:'你是怎么走上现在这条路的？是主动选择，还是被某些事情推着走的？' },
  { id:'a05', cat:'转折',     text:'你人生里有没有一个决定，回头看是真正的分叉口？那时候你是怎么做决定的？' },
  { id:'a06', cat:'关系',     text:'对你来说，最重要的关系是什么样的？可以是任何形式的。' },
  { id:'a07', cat:'挫折',     text:'你有没有经历过一次彻底的失败或溃败？那段日子是怎么过的？' },
  { id:'a08', cat:'热忱',     text:'什么事情是你做起来完全不需要理由的？这个答案，有没有随时间变过？' },
  { id:'a09', cat:'内心',     text:'你害怕什么？不是蛇或高空那种，而是深处的、会影响你做决定的那种。' },
  { id:'a10', cat:'价值观',   text:'有没有什么事是你绝对不会做的？这条线，是怎么划定的？' },
  { id:'a11', cat:'金钱',     text:'你和钱的关系是什么样的？有没有哪段时期，金钱真正改变了你的选择？' },
  { id:'a12', cat:'影响力',   text:'你觉得你改变过谁吗？或者，有没有人会因为认识你而不一样？' },
  { id:'a13', cat:'遗憾',     text:'如果有遗憾，你愿意说说吗？没有也完全可以。' },
  { id:'a14', cat:'印记',     text:'你希望自己被记住的是什么？或者，你根本不在乎被记住？' },
  { id:'a15', cat:'传承',     text:'如果你的故事能传下去，你最想让人知道的一件事是什么？' },
];

// 衍生题 — 根据用户标签动态匹配的深化追问
const BRANCHES = [
  // 创业 / 职业变动
  { id:'b01', triggerTags:['entrepreneur','startup','quit_job'],
    cat:'创业',   text:'创业那一步，是什么让你觉得"现在必须做"？有没有一个具体的临界点？' },
  { id:'b02', triggerTags:['startup','risk','entrepreneur'],
    cat:'坚持',   text:'那段最难的时期——你怎么知道要继续，而不是放弃？' },
  { id:'b03', triggerTags:['career_change','quit_job','pivot'],
    cat:'转身',   text:'做那个转变之前，你身边的人是怎么反应的？你在乎他们的看法吗？' },
  { id:'b04', triggerTags:['fired','achievement','success'],
    cat:'代价',   text:'那个结果的背后，最不被人看到的那部分代价是什么？' },
  // 家庭 / 压力
  { id:'b05', triggerTags:['parent_conflict','family_pressure'],
    cat:'家庭',   text:'和家里的那些分歧，你们后来有没有和解的时刻？或者一直就这样搁在那里？' },
  { id:'b06', triggerTags:['expectation','family_pressure'],
    cat:'期待',   text:'家人对你的期望，你是怎么处理那种压力的？有没有某个时刻，你决定按自己的方式来？' },
  // 感情 / 关系
  { id:'b07', triggerTags:['marriage','divorce','partner','love'],
    cat:'感情',   text:'那段关系，让你明白了什么关于自己的事？' },
  { id:'b08', triggerTags:['loneliness','isolation'],
    cat:'孤独',   text:'独处的时候，你最常想的是什么？那种感觉，现在还有吗？' },
  { id:'b09', triggerTags:['betrayal','friendship'],
    cat:'信任',   text:'那件事之后，你对人的信任有没有什么变化？' },
  // 迁移 / 异乡
  { id:'b10', triggerTags:['migration','moved'],
    cat:'离开',   text:'离开那个地方之后，你有没有过后悔的时刻？或者某个瞬间很想回去？' },
  { id:'b11', triggerTags:['abroad','cultural_shock','belonging'],
    cat:'归属',   text:'在那个新的地方，你什么时候才第一次觉得"这里也是我的"？' },
  // 失去 / 健康
  { id:'b12', triggerTags:['death','loss','grief'],
    cat:'失去',   text:'失去他/她之后，你的生活里有没有什么东西悄然变了，自己都没意识到的那种？' },
  { id:'b13', triggerTags:['illness','health'],
    cat:'身体',   text:'那段时候，你对时间的感受有没有变化？' },
  // 创作 / 热忱
  { id:'b14', triggerTags:['art','music','writing','creative','design'],
    cat:'创作',   text:'你第一次感觉到"这就是我需要的东西"是什么时候？' },
  { id:'b15', triggerTags:['art','music','writing','creative'],
    cat:'放弃',   text:'如果有一天你必须放弃它，你会失去什么？' },
  // 教育
  { id:'b16', triggerTags:['study','university','teacher'],
    cat:'求学',   text:'学那些东西的时候，你心里真正想要的是什么？和表面上的目标一样吗？' },
  // 信仰 / 价值
  { id:'b17', triggerTags:['faith','religion','belief','spiritual'],
    cat:'信仰',   text:'这种信仰或信念，有没有在你最难的时候真正撑住你？' },
  { id:'b18', triggerTags:['fairness','justice','courage','sacrifice'],
    cat:'选择',   text:'有没有一次，你明知道应该做什么，但还是选了另一条路？' },
  // 金钱
  { id:'b19', triggerTags:['finance','debt','poor','investment'],
    cat:'困境',   text:'那段财务上最艰难的时期，对你来说最难熬的不是钱的事，而是什么？' },
  // 身份
  { id:'b20', triggerTags:['identity','culture','heritage','belonging'],

// 状态
// ══════════════════════════════════════════════════════════════════════════════

const SK = 'lifestory_v2';

function defState() {
  return {
    answers:       [],  // [{id, type, cat, question, answer, analysis, timestamp, privacy}]
    usedIds:       [],  // 所有已出现的题目 ID（含跳过）
    anchorsDone:   [],  // 已答完的锚点 ID
    tags:          [],  // 累积的用户标签
    historicalUsed: 0,  // 历史时空题使用次数（上限 2）
    lastAnalysis:  null,
    lastStory:     null,
    draft:         { qId: null, text: '', privacy: false },
    themeFilter:   null,  // 主题筛选（null = 不筛选，或 category 名称）
  };
}

let state;
let currentQ   = null;  // 当前题目对象
let prevSec    = 'sec-welcome';
let recognition = null;
let isRec      = false;
let recTimer   = null;
let recSeconds = 0;
let recRetries = 0;  // 语音识别重试次数

function loadState()  { try { return JSON.parse(localStorage.getItem(SK)) || defState(); } catch { return defState(); } }
function saveState()  { localStorage.setItem(SK, JSON.stringify(state)); }

// ══════════════════════════════════════════════════════════════════════════════
// 路由引擎 — 决定下一道题
// ══════════════════════════════════════════════════════════════════════════════

function pickNext(analysis) {
  const { usedIds, tags, historicalUsed, themeFilter } = state;

  // 主题筛选函数
  const matchesTheme = (q) => {
    if (!themeFilter) return true;
    return q.cat === themeFilter;
  };

  // 优先级 1：历史时空催化（满足年份+地点，且全程 < 2 次）
  if (analysis && !analysis.isEvasion && historicalUsed < 2 && analysis.year) {
    const hist = HISTORICAL.find(h => {
      if (usedIds.includes(h.id)) return false;
      const inRange = analysis.year >= h.yearRange[0] && analysis.year <= h.yearRange[1];
      if (!inRange) return false;
      if (!h.locations) return true;
      return !analysis.location || h.locations.some(l => analysis.location.includes(l));
    });
    if (hist && matchesTheme(hist)) {
      state.historicalUsed++;
      const text = hist.text
        .replace('{location}', analysis.location || '那里')
        .replace('{year}', String(analysis.year));
      return { ...hist, type: 'historical', text };
    }
  }

  // 优先级 2：衍生追问（标签匹配，且对话已有足够信息 ≥ 3 轮）
  if (analysis && !analysis.isEvasion && state.answers.length >= 3 && tags.length > 0) {
    const best = BRANCHES
      .filter(b => !usedIds.includes(b.id) && matchesTheme(b))
      .map(b => ({ b, score: b.triggerTags.filter(t => tags.includes(t)).length }))
      .filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)[0];
    if (best) return { ...best.b, type: 'branch' };
  }

  // 优先级 3：下一道锚点题
  const anchor = ANCHORS.find(q => !usedIds.includes(q.id) && matchesTheme(q));
  if (anchor) return { ...anchor, type: 'anchor' };

  // 优先级 4：剩余衍生题（锚点全部答完后）
  const anyBranch = BRANCHES.find(q => !usedIds.includes(q.id) && matchesTheme(q));
  return anyBranch ? { ...anyBranch, type: 'branch' } : null;
}

// API 调用
// ══════════════════════════════════════════════════════════════════════════════

async function callAnalyze(question, answer) {
  const res = await fetch('/api/lifestory', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'analyze',
      question, answer,
      recentHistory: state.answers.slice(-4),
      knownTags: state.tags,
    }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data.analysis;
}

async function callBridge(lastAnswer, nextQuestion) {
  const res = await fetch('/api/lifestory', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'bridge', lastAnswer, nextQuestion }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data.bridge || '';
}

async function confirmGenStory() {
  const n = state.answers.length;
  const privateN = state.answers.filter(a => a.privacy).length;
  const cats = new Set(state.answers.map(a => a.cat)).size;

  const summary = `即将基于 ${n} 条回答生成故事` +
    `${privateN > 0 ? `（其中 ${privateN} 条标记为隐私，不会被分析）` : ``}` +
    `，涉及 ${cats} 个主题。`;

  if (confirm(summary + '\n\n确定生成吗？')) {
    await genStory();
  }
}

async function genStory() {
  if (!state.answers.length) return;
  prevSec = document.querySelector('.sec.on')?.id || 'sec-welcome';
  show('sec-story');

  let progressEl = document.getElementById('story-wrap');
  progressEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>正在撰写你的故事</span><div style="font-size:12px; color:var(--text2); margin-top:8px;">这可能需要 30-60 秒…</div></div>';

  let progressTimer = setInterval(() => {
    const dots = progressEl.querySelector('span');
    if (dots) {
      const text = dots.textContent;
      if (text.endsWith('…')) {
        dots.textContent = '正在撰写你的故事';
      } else {
        dots.textContent += '…';
      }
    }
  }, 1000);

  try {
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 90000);  // 90 秒超时

    const res = await fetch('/api/lifestory', {
      method: 'POST',
      signal: ctrl.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'story', answers: state.answers }),
    });

    clearTimeout(timeoutId);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    state.lastStory = data.story;
    saveState();
    clearInterval(progressTimer);
    renderStory(data.story);
  } catch (e) {
    clearInterval(progressTimer);
    const errMsg = e.name === 'AbortError'
      ? '生成超时（服务器响应过慢）。请稍后重试。'
      : `生成失败：${e.message}`;
    document.getElementById('story-wrap').innerHTML =
      `<div class="err">${errMsg}<br><button onclick="genStory()" style="margin-top:10px; padding:6px 16px; background:var(--accent); color:#fff; border:none; border-radius:16px; cursor:pointer; font-size:13px;">重新生成</button></div>`;
  }
}

// 主流程

// nextTurn：选下一道题，如有 lastAnswer 则生成衔接语
async function nextTurn(analysis, lastAnswer) {
  show('sec-loading');
  document.getElementById('loading-msg').textContent =
    lastAnswer ? '正在思考下一个问题…' : '正在准备问题…';

  const next = pickNext(analysis);
  if (!next) {
    const msg = state.themeFilter
      ? `"${state.themeFilter}" 主题的问题都答完了！要继续回答其他主题，还是生成故事？`
      : '你已经回答了所有问题！';
    showBetween(msg, true);
    return;
  }

  currentQ = next;
  if (!state.usedIds.includes(next.id)) state.usedIds.push(next.id);
  saveState();

  // 知道下一题后，才生成精准衔接语
  let bridge = '';
  if (lastAnswer && !analysis?.isEvasion) {
    try { bridge = await callBridge(lastAnswer, next.text); }
    catch { bridge = ''; }
  }

  showQ(next, bridge);
}

function showQ(q, transition) {
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-num').textContent = `第 ${state.answers.length + 1} 题`;
  document.getElementById('q-transition').textContent = transition || '';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-ta').value = '';
  document.getElementById('privacy-chk').checked = false;
  document.getElementById('char-ct').textContent = '0 字';
  document.getElementById('char-hint').style.display = 'none';
  document.getElementById('q-err').innerHTML = '';

  // 检查是否有未提交的草稿
  if (state.draft.qId === q.id && state.draft.text) {
    const msg = document.getElementById('q-err');
    msg.innerHTML = `<div class="err">✓ 检测到未提交的回答，已为你恢复。</div>`;
    document.getElementById('q-ta').value = state.draft.text;
    document.getElementById('privacy-chk').checked = state.draft.privacy;
    state.draft = { qId: null, text: '', privacy: false };
    updateCount();
  }

  show('sec-q');
  document.getElementById('q-ta').focus();
}

async function submitAnswer() {
  const answer = document.getElementById('q-ta').value.trim();
  if (!answer) {
    document.getElementById('q-err').innerHTML =
      '<div class="err">请先写下你的回答，或者点"跳过这题"。</div>';
    return;
  }

  const privacy = document.getElementById('privacy-chk').checked;
  state.draft = { qId: currentQ.id, text: answer, privacy };
  saveState();

  show('sec-loading');
  document.getElementById('loading-msg').textContent = '正在理解你的回答…';

  let analysis;
  try {
    // 如果标记为隐私，只保存不分析
    if (privacy) {
      analysis = { tags:[], year:null, location:null, isEvasion:false, softLanding:null };
    } else {
      analysis = await callAnalyze(currentQ.text, answer);
    }
  } catch (err) {
    // 网络失败：显示重试对话框
    show('sec-q');
    const msg = document.getElementById('q-err');
    msg.innerHTML = `<div class="err">提交失败：${err.message}<br><button onclick="submitAnswer()" style="margin-top:10px; padding:6px 16px; background:var(--accent); color:#fff; border:none; border-radius:16px; cursor:pointer; font-size:13px;">重试</button></div>`;
    return;
  }

  // 累积标签
  if (analysis.tags?.length) {
    state.tags = [...new Set([...state.tags, ...analysis.tags])];
  }
  state.lastAnalysis = analysis;

  if (analysis.isEvasion) {
    // 软着陆：记录跳过，不保存到 answers
    if (!state.usedIds.includes(currentQ.id)) state.usedIds.push(currentQ.id);
    state.draft = { qId: null, text: '', privacy: false };
    saveState();
    showSoftLanding(analysis.softLanding);
    return;
  }

  // 保存正式回答
  state.answers.push({
    id: currentQ.id,
    type: currentQ.type,
    cat: currentQ.cat,
    question: currentQ.text,
    answer,
    analysis,
    timestamp: new Date().toISOString(),
    privacy,
  });
  if (currentQ.type === 'anchor') {
    if (!state.anchorsDone.includes(currentQ.id)) state.anchorsDone.push(currentQ.id);
  }
  state.draft = { qId: null, text: '', privacy: false };
  saveState();
  updateHdr();

  // 每答完 8 题提示一次"可以生成故事了"
  if (state.answers.length > 0 && state.answers.length % 8 === 0) {
    showBetween(`已回答 ${state.answers.length} 题，现在可以生成故事，或者继续深入。`, false);
    return;
  }

  await nextTurn(analysis, answer);
}

function skipCurrent() {
  if (!state.usedIds.includes(currentQ.id)) state.usedIds.push(currentQ.id);
  if (currentQ.type === 'anchor') state.anchorsDone.push(currentQ.id);
  saveState();
  nextTurn(null);
}

function showSoftLanding(msg) {
  const defaultMsg = '没关系，有些经历确实适合存放在心底。\n我们换个方向聊聊别的。';
  document.getElementById('soft-msg').textContent = msg || defaultMsg;
  show('sec-soft');
}

function showBetween(desc, allDone) {
  const n = state.answers.length;
  document.getElementById('bw-title').textContent = allDone ? '了不起' : '这里是一个好的停顿';
  document.getElementById('bw-desc').textContent = desc || `你已经分享了 ${n} 个故事片段。`;

  const recent = state.answers.slice(-3);
  document.getElementById('bw-list').innerHTML = recent.map(a => `
    <div class="between-item">
      <div class="between-q">${a.question}</div>
      <div>${a.answer.length > 60 ? a.answer.slice(0, 60) + '…' : a.answer}</div>
    </div>`).join('');

  const btnMore = document.querySelector('.btn-more');
  const btnRest = document.querySelector('.btn-rest');

  if (allDone) {
    if (state.themeFilter) {
      // 主题筛选完成：显示清除筛选或生成故事
      btnMore.textContent = '清除筛选，继续';
      btnMore.onclick = () => { state.themeFilter = null; saveState(); nextTurn(null); };
      btnRest.textContent = '生成故事';
      btnRest.onclick = () => confirmGenStory();
    } else {
      // 全部答完
      btnMore.style.display = 'none';
      btnRest.textContent = '生成故事';
      btnRest.onclick = () => confirmGenStory();
    }
  } else {
    btnMore.textContent = '继续回答';
    btnMore.onclick = () => nextTurn(null);
    btnMore.style.display = '';
    btnRest.textContent = '先到这里';
    btnRest.onclick = () => restForNow();
  }
  show('sec-between');
}

function restForNow() {
  const n = state.answers.length;
  document.getElementById('w-title').textContent = '今天到这里吧';

  // 收集已答过的主题，建议用户选择不同的主题继续
  const answeredCats = new Set(state.answers.map(a => a.cat));
  const availableCats = [...new Set([...ANCHORS, ...BRANCHES].map(q => q.cat))]
    .filter(cat => !answeredCats.has(cat));

  let descHtml = `你已经分享了 ${n} 个故事片段。<br>随时回来继续，你的答案都保存好了。`;
  let btnHtml = '<button type="button" class="btn-start" onclick="nextTurn(null)" style="margin-top:12px;">继续 →</button>';

  if (availableCats.length > 0 && availableCats.length <= 5) {
    descHtml += `<br><br><strong style="display:block; margin-top:12px; font-size:14px; color:var(--text);">或选择只回答关于某个主题的问题：</strong>`;
    const catBtns = availableCats.map(cat =>
      `<button type="button" class="btn-start" onclick="setThemeFilter('${cat}'); nextTurn(null);" style="margin:8px 6px 0 0; padding:8px 16px; font-size:13px; background:var(--accentl); color:var(--accent);">仅 ${cat}</button>`
    ).join('');
    btnHtml = `<div style="margin-top:16px;">${catBtns}<br>${btnHtml}</div>`;
  }

  document.getElementById('w-desc').innerHTML = descHtml + btnHtml;
  document.getElementById('btn-start').textContent = '全部继续 →';
  show('sec-welcome');
}

function setThemeFilter(theme) {
  state.themeFilter = theme;
  saveState();
  document.getElementById('w-desc').innerHTML = `<div style="font-size:14px; color:var(--text2);">已筛选：仅回答关于 <strong>${theme}</strong> 的问题<br><button type="button" style="margin-top:8px; padding:6px 12px; background:none; border:1px solid var(--border); border-radius:16px; font-size:12px; cursor:pointer; color:var(--text2);" onclick="state.themeFilter=null; saveState(); restForNow();">清除筛选</button></div>`;
}

function backFromStory() { show(prevSec); }

function showPrevStory() {
  if (state.lastStory) { renderStory(state.lastStory); prevSec = 'sec-welcome'; show('sec-story'); }
}

function renderStory(md) {
  document.getElementById('story-wrap').innerHTML =
    `<div class="story-body">${marked.parse(md)}</div>`;
}

function exportData() {
  if (!state.answers.length) {
    alert('没有数据可导出。');
    return;
  }
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lifestory-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  alert('✓ 数据已下载');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);

      // 数据验证：检查必要字段
      if (!imported.answers || !Array.isArray(imported.answers)) {
        throw new Error('数据格式错误：缺少 answers 数组');
      }

      if (!confirm(`即将导入 ${imported.answers.length} 条回答。现有数据将被覆盖。确定吗？`)) {
        return;
      }

      // 合并或覆盖：若当前有数据，提示选择
      if (state.answers.length > 0) {
        if (!confirm('当前已有 ' + state.answers.length + ' 条回答。覆盖还是合并？（取消=取消导入）')) {
          return;
        }
        // 如果用户点击确定，则覆盖
      }

      // 覆盖状态
      state = imported;
      // 确保必要字段存在
      if (!state.draft) state.draft = { qId: null, text: '', privacy: false };
      if (!state.themeFilter) state.themeFilter = null;
      saveState();
      updateHdr();

      // 刷新页面以更新 UI
      alert(`✓ 已导入 ${state.answers.length} 条回答。页面将刷新。`);
      location.reload();
    } catch (err) {
      alert(`导入失败：${err.message}`);
    }
  };
  reader.readAsText(file);

  // 重置文件输入，以便下次可以导入同一文件
  event.target.value = '';
}

function resetAll() {
  if (!confirm('确定要清除所有回答和数据吗？此操作不可撤销。')) return;
  localStorage.removeItem(SK);
  location.reload();
}

// ══════════════════════════════════════════════════════════════════════════════
// 语音
// ══════════════════════════════════════════════════════════════════════════════

function initRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;   // 不自动停止，手动控制
  recognition.interimResults = true;
  return true;
}

function startRecTimer() {
  recSeconds = 0;
  recTimer = setInterval(() => {
    recSeconds++;
    document.getElementById('mic-lbl').textContent = `录音中… ${recSeconds} 秒`;
  }, 1000);
}

function stopRecTimer() {
  if (recTimer) { clearInterval(recTimer); recTimer = null; }
  document.getElementById('mic-lbl').textContent = '语音输入';
}

function toggleVoice() {
  if (!recognition && !initRec()) { alert('您的浏览器不支持语音输入，请使用 Chrome 或 Edge。'); return; }
  if (isRec) { recognition.stop(); return; }

  const ta  = document.getElementById('q-ta');
  const btn = document.getElementById('btn-mic');
  const accumulated = ta.value;
  let finalBuffer = '';
  let shouldRetry = false;

  recognition.onstart = () => {
    isRec = true;
    btn.classList.add('rec');
    startRecTimer();
    shouldRetry = false;
  };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalBuffer += e.results[i][0].transcript;
      else interim = e.results[i][0].transcript;
    }
    ta.value = accumulated + finalBuffer + interim;
    updateCount();
    if (finalBuffer) shouldRetry = false;  // 有结果就不重试
  };
  recognition.onend = () => {
    isRec = false;
    btn.classList.remove('rec');
    stopRecTimer();
    ta.value = accumulated + finalBuffer;
    updateCount();
    // 如果应该重试且次数未超限，自动重新启动
    if (shouldRetry && recRetries < 2) {
      recRetries++;
      document.getElementById('mic-lbl').textContent = `重新连接中… (${recRetries}/2)`;
      setTimeout(() => toggleVoice(), 500);
    } else {
      recRetries = 0;
    }
  };
  recognition.onerror = (e) => {
    stopRecTimer();
    const retryableErrors = ['network', 'no-speech', 'audio-capture'];
    shouldRetry = retryableErrors.includes(e.error);
    if (e.error === 'aborted') {
      isRec = false;
      btn.classList.remove('rec');
    }
    // 不立即显示错误，等 onend 触发后决定是否重试
  };
  recognition.start();
}

function updateCount() {
  const len = document.getElementById('q-ta').value.length;
  document.getElementById('char-ct').textContent = `${len} 字`;

  const hint = document.getElementById('char-hint');
  if (len === 0) {
    hint.style.display = 'none';
  } else if (len < 20) {
    hint.className = 'char-hint short';
    hint.textContent = '太短了，AI 可能理解不了。试试说得详细一点？';
    hint.style.display = 'block';
  } else if (len < 100) {
    hint.className = 'char-hint good';
    hint.textContent = '✓ 长度适中';
    hint.style.display = 'block';
  } else if (len < 500) {
    hint.className = 'char-hint long';
    hint.textContent = '⚠ 有点长，可以精简';
    hint.style.display = 'block';
  } else {
    hint.className = 'char-hint toolong';
    hint.textContent = '太长了，建议 200-400 字';
    hint.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// 工具
// ══════════════════════════════════════════════════════════════════════════════

function show(id) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function updateHdr() {
  const n = state.answers.length;
  let remaining = 0;

  // 计算剩余题目数
  if (state.themeFilter) {
    remaining = [...ANCHORS, ...BRANCHES, ...HISTORICAL]
      .filter(q => !state.usedIds.includes(q.id) && q.cat === state.themeFilter)
      .length;
  } else {
    remaining = [...ANCHORS, ...BRANCHES, ...HISTORICAL]
      .filter(q => !state.usedIds.includes(q.id))
      .length;
  }

  const progText = n ? `已回答 ${n} 题` : '';
  const remText = remaining > 0 ? ` · 还剩 ${remaining} 题` : '';
  document.getElementById('hdr-prog').textContent = progText + remText;
  document.getElementById('btn-gen').disabled = n === 0;
  document.getElementById('prog-fill').style.width = `${Math.min(n / 15 * 100, 100)}%`;
}

// ══════════════════════════════════════════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════════════════════════════════════════

state = loadState();
updateHdr();

if (state.answers.length > 0) {
  const cats = new Set(state.answers.map(a => a.cat)).size;
  const chars = state.answers.reduce((sum, a) => sum + a.answer.length, 0);

  document.getElementById('w-title').textContent = '欢迎回来';
  document.getElementById('w-desc').innerHTML =
    `你已经分享了 <strong>${state.answers.length}</strong> 个故事片段<br>` +
    `涉及 <strong>${cats}</strong> 个主题，共约 <strong>${Math.round(chars/1000)*1000 || chars}</strong> 字。<br>` +
    `准备好继续了吗？`;
  document.getElementById('btn-start').textContent = '继续 →';
  if (state.lastStory) document.getElementById('btn-prev-story').classList.remove('hidden');
}

document.getElementById('q-ta').addEventListener('input', updateCount);
</script>
