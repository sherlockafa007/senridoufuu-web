<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千里同風株式会社 — ブログ</title>
  <meta name="description" content="AI・ハードウェア・日本市場に関する千里同風株式会社のインサイトとコラム。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <base href="../../">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page-title="blog_page_title">

  <div id="nav-placeholder"></div>

  <main>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__container">
        <div data-animate>
          <span class="section__eyebrow" data-i18n="blog_eyebrow">ブログ</span>
          <h1 class="section__title" data-i18n="blog_title">インサイト</h1>
          <p class="section__lead" data-i18n="blog_intro">
            AI・ハードウェア・日本市場に関する考察と発見を書き留めています。
          </p>
        </div>
      </div>
    </div>

    <!-- Blog List -->
    <section class="section">

      <!--
        === BLOG POSTS ===
        To add a post, copy the block below and fill in the details.
        Create a new file at /solutions/blog/[post-slug].html for each post.

      <a href="/solutions/blog/your-post-slug.html" class="blog-item" data-animate>
        <div class="blog-item__date">
          2025<br>01.15
        </div>
        <div>
          <div class="blog-item__tag">AI · ハードウェア</div>
          <h2 class="blog-item__title">記事のタイトルをここに入れてください</h2>
          <p class="blog-item__excerpt">
            記事の要約文。2〜3文程度で内容を説明します。
          </p>
        </div>
      </a>

      -->

      <!-- Empty state -->
      <div class="blog-empty" data-animate>
        <p data-i18n="blog_empty">記事は近日公開予定です。</p>
      </div>

    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
</body>
</html>
