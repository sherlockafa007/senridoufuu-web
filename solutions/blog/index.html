<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千里同風株式会社 — ブログ</title>
  <meta name="description" content="AI・ハードウェア・日本市場に関する千里同風株式会社のインサイトとコラム。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <base href="../../">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page-title="blog_page_title">

  <div id="nav-placeholder"></div>

  <main>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__container">
        <div data-animate>
          <span class="section__eyebrow" data-i18n="blog_eyebrow">ブログ</span>
          <h1 class="section__title" data-i18n="blog_title">インサイト</h1>
          <p class="section__lead" data-i18n="blog_intro">
            AI・ハードウェア・日本市場に関する考察と発見を書き留めています。
          </p>
        </div>
      </div>
    </div>

    <!-- Blog List -->
    <section class="section">

      <!-- Empty state（无文章时天然显示；有文章时下方脚本会移除它并插入卡片） -->
      <div class="blog-empty" data-animate>
        <p data-i18n="blog_empty">記事は近日公開予定です。</p>
      </div>

    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script type="module" src="js/tracking.js"></script>
  <script>
    let blogPostsCache = [];

    function escapeHtmlList(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderBlogCards(lang) {
      const container = document.querySelector('.section');
      if (!container) return;
      const validLang = ['ja', 'zh', 'en'].includes(lang) ? lang : 'ja';
      container.querySelectorAll('.blog-item').forEach((el) => el.remove());
      const emptyEl = container.querySelector('.blog-empty');
      if (blogPostsCache.length === 0) {
        if (emptyEl) emptyEl.style.display = '';
        return;
      }
      if (emptyEl) emptyEl.style.display = 'none';
      const html = blogPostsCache
        .map((p) => {
          // posts.json 里 title/body 各自是三语对象（{ja,zh,en}），不是按语言分组的 {title,body}。
          const title = (p.title && p.title[validLang]) || (p.title && p.title.ja) || '';
          const body = (p.body && p.body[validLang]) || (p.body && p.body.ja) || '';
          const [y, m, day] = p.date.split('-');
          const excerpt = body
            .replace(/[#*_`]/g, '')
            .replace(/\n+/g, ' ')
            .trim()
            .slice(0, 80);
          // 不用 data-animate：滚动淡入的 IntersectionObserver 只在页面首次加载时
          // 登记一次现有元素，这批卡片是加载完之后才异步插入的，永远赶不上那次登记，
          // 会停留在"淡入前"的 opacity:0 状态、肉眼不可见。直接常显更简单可靠。
          return `<a href="/solutions/blog/${p.slug}.html" class="blog-item">
          <div class="blog-item__date">${y}<br>${m}.${day}</div>
          <div>
            <div class="blog-item__tag">${escapeHtmlList(p.tag)}</div>
            <h2 class="blog-item__title">${escapeHtmlList(title)}</h2>
            <p class="blog-item__excerpt">${escapeHtmlList(excerpt)}…</p>
          </div>
        </a>`;
        })
        .join('');
      container.insertAdjacentHTML('beforeend', html);
    }

    fetch('/solutions/blog/posts.json')
      .then((r) => (r.ok ? r.json() : []))
      .then((posts) => {
        blogPostsCache = Array.isArray(posts) ? posts : [];
        renderBlogCards(currentLang);
      })
      .catch(() => {});

    // main.js 的语言按钮通过 addEventListener(() => switchLang(...)) 调用时才查找
    // window.switchLang，可以安全包一层而不改 main.js。
    const _switchLang = window.switchLang;
    window.switchLang = function (lang) {
      _switchLang(lang);
      renderBlogCards(lang);
    };
  </script>
</body>
</html>
