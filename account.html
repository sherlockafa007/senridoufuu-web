<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员中心 · 千里同風</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #faf9f7;
      --paper:  #ffffff;
      --text:   #1f1c17;
      --text2:  #6b6359;
      --accent: #2563eb;
      --border: #e8e2da;
      --green:  #10b981;
      --red:    #ef4444;
    }
    body {
      font-family: 'Noto Sans SC', 'Noto Sans JP', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* ── Header ── */
    .hdr { padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--paper); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .hdr a.brand { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: 0.08em; }
    .hdr a.brand:hover { color: var(--accent); }
    /* ── Language switch ── */
    .lang-switch { display: flex; gap: 2px; }
    .lang-btn { background: none; border: 1px solid var(--border); color: var(--text2); font-family: inherit; font-size: 12px; padding: 4px 9px; border-radius: 7px; cursor: pointer; transition: border-color .15s, color .15s, background .15s; }
    .lang-btn:hover { color: var(--text); border-color: #9ca3af; }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    /* ── Card ── */
    .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .card { background: var(--paper); border: 1px solid var(--border); border-radius: 16px; padding: 52px 44px; max-width: 420px; width: 100%; text-align: center; }
    .icon { font-size: 52px; margin-bottom: 20px; }
    .card-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .card-desc { font-size: 14px; color: var(--text2); line-height: 1.9; margin-bottom: 24px; }
    /* ── Form ── */
    .form-input {
      display: block; width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .15s; margin-bottom: 10px; background: var(--paper);
    }
    .form-input:focus { border-color: var(--accent); }
    .form-error { font-size: 13px; min-height: 18px; margin-bottom: 10px; }
    .form-error.err { color: var(--red); }
    .form-error.ok  { color: var(--green); }
    /* ── Buttons ── */
    .btn-primary {
      display: block; width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-family: inherit;
      cursor: pointer; transition: opacity .2s; margin-bottom: 10px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-secondary {
      display: block; width: 100%; padding: 13px; background: none; color: var(--text2);
      border: 1px solid var(--border); border-radius: 12px; font-size: 14px;
      font-family: inherit; cursor: pointer; transition: border-color .2s, color .2s;
      text-decoration: none; margin-bottom: 10px;
    }
    .btn-secondary:hover { border-color: #9ca3af; color: var(--text); }
    .btn-forgot {
      display: block; width: 100%; background: none; border: none;
      font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit;
      margin-bottom: 16px; text-align: center;
    }
    .btn-forgot:hover { color: var(--text); }
    .btn-danger {
      display: inline-block; margin-top: 20px; background: none; border: none;
      font-size: 13px; color: #9ca3af; cursor: pointer; font-family: inherit;
    }
    .btn-danger:hover { color: var(--red); }
    /* ── User state ── */
    #state-loading { display: block; }
    #state-guest   { display: none; }
    #state-member  { display: none; }
    .member-email { font-size: 13px; color: var(--text2); margin-bottom: 24px; padding: 8px 16px; background: #f3f4f6; border-radius: 8px; }
    .tool-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border: 1px solid var(--border); border-radius: 10px;
      text-decoration: none; color: var(--text); font-size: 14px;
      transition: border-color .2s, background .2s; margin-bottom: 10px; text-align: left;
    }
    .tool-link:hover { border-color: var(--accent); background: #eff6ff; }
    .tool-link__name { font-weight: 500; }
    .tool-link__desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .tool-link__arrow { color: #9ca3af; font-size: 16px; }
    /* ── Footer ── */
    .foot { padding: 20px 32px; border-top: 1px solid var(--border); font-size: 12px; color: #9ca3af; text-align: center; }
    /* ── Admin link ── */
    #admin-link { display: none; border-color: #d1fae5; background: #f0fdf4; }
    .account-status { display: none; margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.7; }
    .account-status.pending  { background: #fefce8; color: #854d0e; border: 1px solid #fde047; }
    .account-status.disabled { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    /* ── Register view ── */
    #view-register { display: none; }
    /* ── Password change ── */
    #pw-section { display: none; margin-top: 4px; border-top: 1px solid var(--border); padding-top: 14px; }
    #pw-section.open { display: block; }
    @media (max-width: 500px) { .card { padding: 36px 24px; } .hdr { padding: 16px 20px; } }
  </style>
</head>

<header class="hdr">
  <a href="./" class="brand">千里同風 株式会社</a>

        <button type="button" id="to-register" class="btn-secondary" data-i18n="to_register">还没有账号？注册</button>
        <a class="btn-secondary" href="./" data-i18n="back_home">← 返回首页</a>
      </div>

      <!-- Register view -->

        <div class="icon">✉️</div>
        <h1 class="card-title" data-i18n="reg_title">注册账号</h1>
        <p class="card-desc" data-i18n="reg_desc">创建账号后即可使用会员功能。</p>
        <form id="register-form" novalidate>
          <input id="reg-email"    type="email"    class="form-input" data-i18n-ph="ph_email"     placeholder="邮箱地址" autocomplete="email">
          <input id="reg-password" type="password" class="form-input" data-i18n-ph="ph_password6" placeholder="密码（至少 6 位）" autocomplete="new-password">
          <input id="reg-confirm"  type="password" class="form-input" data-i18n-ph="ph_confirm"   placeholder="确认密码" autocomplete="new-password">
          <div id="reg-error" class="form-error"></div>
          <button type="submit" class="btn-primary" data-i18n="btn_register">注册</button>
        </form>
        <button type="button" id="to-login" class="btn-secondary" data-i18n="to_login">已有账号？登录</button>
      </div>

    </div>

    <!-- Member (logged in) -->
    <div id="state-member">
      <div class="icon">✦</div>
      <h1 class="card-title" data-i18n="welcome">欢迎回来</h1>
      <p class="member-email" id="member-email"></p>
      <div id="account-status" class="account-status"></div>
      <div id="tool-list">

        <a class="tool-link" href="solutions/demo.html">

          </div>

      <div id="pw-section">

        <input id="pw-new"     type="password" class="form-input" data-i18n-ph="ph_pw_new"     placeholder="新密码（至少 6 位）" autocomplete="new-password">
        <input id="pw-confirm" type="password" class="form-input" data-i18n-ph="ph_pw_confirm" placeholder="确认新密码" autocomplete="new-password">
        <div id="pw-msg" class="form-error"></div>

      </div>
      <button id="pw-toggle" type="button" class="btn-forgot" data-i18n="pw_toggle">修改密码</button>
      <button id="logout-btn" type="button" class="btn-danger" data-i18n="logout">退出登录</button>
    </div>

  </div>
</div>

  let currentLang = localStorage.getItem('sdf_lang') || 'ja';
  const dict = () => T[currentLang] || T.ja;
  const t = (key) => dict()[key] ?? key;

  function applyLang(lang) {
    currentLang = T[lang] ? lang : 'ja';
    localStorage.setItem('sdf_lang', currentLang);
    document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : currentLang;
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      const v = dict()[el.dataset.i18n];
      if (v != null) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach((el) => {
      const v = dict()[el.dataset.i18nPh];
      if (v != null) el.placeholder = v;
    });
    // Re-translate any active message (login error, status, etc.)
    document.querySelectorAll('[data-msg-key]').forEach((el) => {
      el.textContent = t(el.dataset.msgKey);
    });
    document.querySelectorAll('.lang-btn').forEach((b) => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
  }

  // Set / clear translatable message elements (records the key for re-translation).
  function showMsg(el, key, klass) {
    el.className = klass;
    el.dataset.msgKey = key;
    el.textContent = t(key);
  }
  function clearMsg(el, klass) {
    el.className = klass;
    el.textContent = '';
    delete el.dataset.msgKey;
  }

    b.addEventListener('click', () => applyLang(b.dataset.lang));
  });

  onAuthStateChanged(auth, async user => {
    if (user) {
      localStorage.setItem('sdf_user_email', user.email);
      document.getElementById('member-email').textContent = user.email;
      document.getElementById('admin-link').style.display =
        ADMINS.includes(user.email) ? 'flex' : 'none';
      const statusEl = document.getElementById('account-status');
      if (!ADMINS.includes(user.email)) {
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          const status = snap.data()?.status || 'pending';
          if (status === 'approved') {
            clearMsg(statusEl, 'account-status');
            statusEl.style.display = 'none';
          } else {
            showMsg(statusEl, status === 'disabled' ? 'st_disabled' : 'st_pending',
              'account-status ' + (status === 'disabled' ? 'disabled' : 'pending'));
            statusEl.style.display = 'block';
            document.getElementById('tool-list').style.display = 'none';
          }
        } catch {
          showMsg(statusEl, 'st_load_fail', 'account-status pending');
          statusEl.style.display = 'block';
        }
      }
      show('state-member');
    } else {
      localStorage.removeItem('sdf_user_email');
      clearMsg(document.getElementById('account-status'), 'account-status');
      document.getElementById('account-status').style.display = 'none';
      document.getElementById('tool-list').style.display = '';
      show('state-guest');
    }
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    clearMsg(errEl, 'form-error');
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch {
      showMsg(errEl, 'err_login', 'form-error err');
    }
  });

  document.getElementById('forgot-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const errEl = document.getElementById('login-error');
    clearMsg(errEl, 'form-error');
    if (!email) { showMsg(errEl, 'err_need_email', 'form-error err'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showMsg(errEl, 'reset_sent', 'form-error ok');
    } catch {
      showMsg(errEl, 'reset_fail', 'form-error err');
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

  /* ── Login / Register view toggle ── */
  function showView(name) {
    document.getElementById('view-login').style.display    = name === 'login'    ? 'block' : 'none';
    document.getElementById('view-register').style.display = name === 'register' ? 'block' : 'none';
  }
  document.getElementById('to-register').addEventListener('click', () => {
    clearMsg(document.getElementById('login-error'), 'form-error');
    showView('register');
  });
  document.getElementById('to-login').addEventListener('click', () => {
    clearMsg(document.getElementById('reg-error'), 'form-error');
    showView('login');
  });

  /* ── Register ── */
  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email   = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const errEl    = document.getElementById('reg-error');
    clearMsg(errEl, 'form-error');

    if (!email || !password || !confirm) { showMsg(errEl, 'err_all_fields', 'form-error err'); return; }
    if (password.length < 6) { showMsg(errEl, 'err_pw_len', 'form-error err'); return; }
    if (password !== confirm) { showMsg(errEl, 'err_pw_mismatch', 'form-error err'); return; }
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, 'users', cred.user.uid), {
        email: cred.user.email,
        status: 'pending',
        createdAt: serverTimestamp()
      });
    } catch (err) {
      const key = err.code === 'auth/email-already-in-use' ? 'err_email_in_use'
        : err.code === 'auth/invalid-email' ? 'err_email_invalid'
        : 'err_register';
      showMsg(errEl, key, 'form-error err');
    }
  });

  /* ── Password change ── */
  document.getElementById('pw-toggle').addEventListener('click', () => {
    const sec = document.getElementById('pw-section');
    sec.classList.toggle('open');
    clearMsg(document.getElementById('pw-msg'), 'form-error');
    ['pw-old','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
  });

  document.getElementById('pw-submit').addEventListener('click', async () => {
    const oldPw  = document.getElementById('pw-old').value;
    const newPw  = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const msg = document.getElementById('pw-msg');
    clearMsg(msg, 'form-error');

    if (!oldPw || !newPw || !confirm) { showMsg(msg, 'err_all_fields', 'form-error err'); return; }
    if (newPw.length < 6) { showMsg(msg, 'err_pw_new_len', 'form-error err'); return; }
    if (newPw !== confirm) { showMsg(msg, 'err_pw_new_mismatch', 'form-error err'); return; }

    const user = auth.currentUser;
    try {
      const cred = EmailAuthProvider.credential(user.email, oldPw);
      await reauthenticateWithCredential(user, cred);
      await updatePassword(user, newPw);
      showMsg(msg, 'pw_updated', 'form-error ok');
      ['pw-old','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
    } catch (err) {
      showMsg(msg, err.code === 'auth/invalid-credential' ? 'err_pw_old' : 'err_pw_fail', 'form-error err');
    }
  });
</script>

</body>
</html>
