<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员中心 · 千里同風</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #faf9f7;
      --paper:  #ffffff;
      --text:   #1f1c17;
      --text2:  #6b6359;
      --accent: #2563eb;
      --border: #e8e2da;
      --green:  #10b981;
      --red:    #ef4444;
    }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* ── Header ── */
    .hdr { padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--paper); }
    .hdr a { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: 0.08em; }
    .hdr a:hover { color: var(--accent); }
    /* ── Card ── */
    .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .card { background: var(--paper); border: 1px solid var(--border); border-radius: 16px; padding: 52px 44px; max-width: 420px; width: 100%; text-align: center; }
    .icon { font-size: 52px; margin-bottom: 20px; }
    .card-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .card-desc { font-size: 14px; color: var(--text2); line-height: 1.9; margin-bottom: 24px; }
    /* ── Form ── */
    .form-input {
      display: block; width: 100%; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .15s; margin-bottom: 10px; background: var(--paper);
    }
    .form-input:focus { border-color: var(--accent); }
    .form-error { font-size: 13px; min-height: 18px; margin-bottom: 10px; }
    .form-error.err { color: var(--red); }
    .form-error.ok  { color: var(--green); }
    /* ── Buttons ── */
    .btn-primary {
      display: block; width: 100%; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-family: inherit;
      cursor: pointer; transition: opacity .2s; margin-bottom: 10px;
    }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-secondary {
      display: block; width: 100%; padding: 13px; background: none; color: var(--text2);
      border: 1px solid var(--border); border-radius: 12px; font-size: 14px;
      font-family: inherit; cursor: pointer; transition: border-color .2s, color .2s;
      text-decoration: none; margin-bottom: 10px;
    }
    .btn-secondary:hover { border-color: #9ca3af; color: var(--text); }
    .btn-forgot {
      display: block; width: 100%; background: none; border: none;
      font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit;
      margin-bottom: 16px; text-align: center;
    }
    .btn-forgot:hover { color: var(--text); }
    .btn-danger {
      display: inline-block; margin-top: 20px; background: none; border: none;
      font-size: 13px; color: #9ca3af; cursor: pointer; font-family: inherit;
    }
    .btn-danger:hover { color: var(--red); }
    /* ── User state ── */
    #state-loading { display: block; }
    #state-guest   { display: none; }
    #state-member  { display: none; }
    .member-email { font-size: 13px; color: var(--text2); margin-bottom: 24px; padding: 8px 16px; background: #f3f4f6; border-radius: 8px; }
    .tool-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border: 1px solid var(--border); border-radius: 10px;
      text-decoration: none; color: var(--text); font-size: 14px;
      transition: border-color .2s, background .2s; margin-bottom: 10px; text-align: left;
    }
    .tool-link:hover { border-color: var(--accent); background: #eff6ff; }
    .tool-link__name { font-weight: 500; }
    .tool-link__desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .tool-link__arrow { color: #9ca3af; font-size: 16px; }
    /* ── Footer ── */
    .foot { padding: 20px 32px; border-top: 1px solid var(--border); font-size: 12px; color: #9ca3af; text-align: center; }
    /* ── Admin link ── */
    #admin-link { display: none; border-color: #d1fae5; background: #f0fdf4; }
    /* ── Password change ── */
    #pw-section { display: none; margin-top: 4px; border-top: 1px solid var(--border); padding-top: 14px; }
    #pw-section.open { display: block; }
    @media (max-width: 500px) { .card { padding: 36px 24px; } }
  </style>
</head>
<body>

<header class="hdr">
  <a href="./">千里同風 株式会社</a>
</header>

<div class="wrap">
  <div class="card">

    <!-- Loading -->
    <div id="state-loading">
      <div class="icon">⟳</div>
      <p class="card-desc">正在验证身份…</p>
    </div>

    <!-- Guest (not logged in) -->
    <div id="state-guest">
      <div class="icon">🔑</div>
      <h1 class="card-title">会员中心</h1>
      <p class="card-desc">此区域仅对受邀会员开放，请登录继续。</p>
      <form id="login-form" novalidate>
        <input id="login-email" type="email" class="form-input" placeholder="邮箱地址" autocomplete="email">
        <input id="login-password" type="password" class="form-input" placeholder="密码" autocomplete="current-password">
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="btn-primary">登录</button>
        <button type="button" id="forgot-btn" class="btn-forgot">忘记密码？</button>
      </form>
      <a class="btn-secondary" href="./">← 返回首页</a>
    </div>

    <!-- Member (logged in) -->
    <div id="state-member">
      <div class="icon">✦</div>
      <h1 class="card-title">欢迎回来</h1>
      <p class="member-email" id="member-email"></p>
      <div id="tool-list">
        <a class="tool-link" id="admin-link" href="solutions/demo/admin.html">
          <div>
            <div class="tool-link__name">🔧 管理后台</div>
            <div class="tool-link__desc">访问记录 · 数据统计</div>
          </div>
          <span class="tool-link__arrow">→</span>
        </a>
        <a class="tool-link" href="solutions/demo/japanese_learner.html">
          <div>
            <div class="tool-link__name">日語基礎学習ツール</div>
            <div class="tool-link__desc">词汇 · 变形引擎 · 小测试</div>
          </div>
          <span class="tool-link__arrow">→</span>
        </a>
        <a class="tool-link" href="solutions/demo.html">
          <div>
            <div class="tool-link__name">全部演示工具</div>
            <div class="tool-link__desc">翻译 · 文档分析 · 生平故事</div>
          </div>
          <span class="tool-link__arrow">→</span>
        </a>
      </div>
      <div id="pw-section">
        <input id="pw-old"     type="password" class="form-input" placeholder="当前密码" autocomplete="current-password">
        <input id="pw-new"     type="password" class="form-input" placeholder="新密码（至少 6 位）" autocomplete="new-password">
        <input id="pw-confirm" type="password" class="form-input" placeholder="确认新密码" autocomplete="new-password">
        <div id="pw-msg" class="form-error"></div>
        <button id="pw-submit" type="button" class="btn-primary">确认修改</button>
      </div>
      <button id="pw-toggle" type="button" class="btn-forgot">修改密码</button>
      <button id="logout-btn" type="button" class="btn-danger">退出登录</button>
    </div>

  </div>
</div>

<footer class="foot">© 2024 千里同風株式会社</footer>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, sendPasswordResetEmail,
           updatePassword, reauthenticateWithCredential, EmailAuthProvider }
    from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

  const app = initializeApp({
    apiKey:            'AIzaSyCjtAqIrGkiqDiETUqxcmkhyBVoa2IHQNM',
    authDomain:        'senridfauthentication.firebaseapp.com',
    projectId:         'senridfauthentication',
    storageBucket:     'senridfauthentication.firebasestorage.app',
    messagingSenderId: '86494932585',
    appId:             '1:86494932585:web:185b8ed922cd491a63fcf8'
  });
  const auth = getAuth(app);
  const ADMINS = ['sherlockafa@gmail.com', 'yuki.minami@senridf.com'];

  function show(id) {
    ['state-loading','state-guest','state-member'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'block' : 'none';
    });
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('member-email').textContent = user.email;
      document.getElementById('admin-link').style.display =
        ADMINS.includes(user.email) ? 'flex' : 'none';
      show('state-member');
    } else {
      show('state-guest');
    }
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.className = 'form-error';
    errEl.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch {
      errEl.className = 'form-error err';
      errEl.textContent = '邮箱或密码错误，请重试。';
    }
  });

  document.getElementById('forgot-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const errEl = document.getElementById('login-error');
    errEl.className = 'form-error';
    if (!email) { errEl.className = 'form-error err'; errEl.textContent = '请先填写邮箱地址。'; return; }
    try {
      await sendPasswordResetEmail(auth, email);
      errEl.className = 'form-error ok';
      errEl.textContent = '重置密码邮件已发送，请查收。';
    } catch {
      errEl.className = 'form-error err';
      errEl.textContent = '发送失败，请检查邮箱地址。';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

  /* ── Password change ── */
  document.getElementById('pw-toggle').addEventListener('click', () => {
    const sec = document.getElementById('pw-section');
    sec.classList.toggle('open');
    document.getElementById('pw-msg').textContent = '';
    ['pw-old','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
  });

  document.getElementById('pw-submit').addEventListener('click', async () => {
    const oldPw  = document.getElementById('pw-old').value;
    const newPw  = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;
    const msg = document.getElementById('pw-msg');
    msg.className = 'form-error';

    if (!oldPw || !newPw || !confirm) {
      msg.className = 'form-error err'; msg.textContent = '请填写所有字段。'; return;
    }
    if (newPw.length < 6) {
      msg.className = 'form-error err'; msg.textContent = '新密码至少 6 位。'; return;
    }
    if (newPw !== confirm) {
      msg.className = 'form-error err'; msg.textContent = '两次输入的新密码不一致。'; return;
    }

    const user = auth.currentUser;
    try {
      const cred = EmailAuthProvider.credential(user.email, oldPw);
      await reauthenticateWithCredential(user, cred);
      await updatePassword(user, newPw);
      msg.className = 'form-error ok'; msg.textContent = '密码已更新。';
      ['pw-old','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
    } catch (err) {
      msg.className = 'form-error err';
      msg.textContent = err.code === 'auth/invalid-credential'
        ? '当前密码错误，请重试。'
        : '修改失败，请稍后再试。';
    }
  });
</script>

</body>
</html>
