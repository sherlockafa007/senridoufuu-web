<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千里同風株式会社 — 沿革</title>
  <meta name="description" content="千里同風株式会社の設立から現在までの歩みをご覧ください。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <base href="../">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page-title="milestones_page_title">

  <div id="nav-placeholder"></div>

  <main>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__container">
        <div data-animate>
          <span class="section__eyebrow" data-i18n="milestones_eyebrow">沿革</span>
          <h1 class="section__title" data-i18n="milestones_title">会社の歩み</h1>
          <p class="section__lead" data-i18n="milestones_body">千里同風株式会社の設立から現在までの歩みをご覧ください。</p>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <section class="section">
      <div class="timeline">

        <div class="timeline__item" data-animate>
          <div class="timeline__year">2024</div>
          <div>
            <h3 class="timeline__event" data-i18n="ms1_event">千里同風株式会社 設立</h3>
            <p class="timeline__desc" data-i18n="ms1_desc">
              大阪市にて設立。生成AI搭載ハードウェアの研究・企画に特化した会社として始動。
            </p>
          </div>
        </div>

        <div class="timeline__item" data-animate data-animate-delay="1">
          <div class="timeline__year">2024</div>
          <div>
            <h3 class="timeline__event" data-i18n="ms2_event">市場調査・製品企画 開始</h3>
            <p class="timeline__desc" data-i18n="ms2_desc">
              日本市場向け生成AIハードウェア製品の調査・コンセプト開発を開始。教育・医療・家電・公共サービス分野での可能性を探求。
            </p>
          </div>
        </div>

        <div class="timeline__item" data-animate data-animate-delay="2">
          <div class="timeline__year">2025</div>
          <div>
            <h3 class="timeline__event" data-i18n="ms3_event">公式ウェブサイト 公開</h3>
            <p class="timeline__desc" data-i18n="ms3_desc">
              千里同風株式会社の公式ウェブサイトをリニューアルし、会社のビジョンとサービスを世界に向けて発信。
            </p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script type="module" src="js/tracking.js"></script>
</body>
</html>
