<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>千里同風株式会社 — チーム</title>
  <meta name="description" content="千里同風株式会社のチームメンバーをご紹介します。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <base href="../">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page-title="team_page_title">

  <div id="nav-placeholder"></div>

  <main>

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header__container">
        <div data-animate>
          <span class="section__eyebrow" data-i18n="team_eyebrow">チーム</span>
          <h1 class="section__title" data-i18n="team_title">私たちのチーム</h1>
          <p class="section__lead" data-i18n="team_body">少数精鋭で、AIとハードウェアの未来を切り拓いています。</p>
        </div>
      </div>
    </div>

    <!-- Team Grid -->
    <section class="section">
      <div class="team-grid">

        <!-- Member 1: Minami Yuki -->
        <div class="team-member" data-animate data-animate-delay="1">
          <div class="team-member__photo">
            <div class="team-member__photo-inner">
              <span class="team-member__photo-monogram">南</span>
            </div>
          </div>
          <div class="team-member__role" data-i18n="team1_role">代表取締役</div>
          <h2 class="team-member__name">南 雪</h2>
          <div class="team-member__name-en">Minami Yuki</div>
          <p class="team-member__bio" data-i18n="team1_bio">
            千里同風株式会社の代表。生成AIを活用したハードウェア製品の事業開発・市場開拓を主導。日本市場向けのAI製品企画・サプライチェーン構築に注力しています。
          </p>
        </div>

        <!-- Member 2: Xie Yiran -->
        <div class="team-member" data-animate data-animate-delay="2">
          <div class="team-member__photo">
            <div class="team-member__photo-inner">
              <span class="team-member__photo-monogram">謝</span>
            </div>
          </div>
          <div class="team-member__role" data-i18n="team2_role">ビジネスアドバイザー</div>
          <h2 class="team-member__name">謝 怡然</h2>
          <div class="team-member__name-en">Xie Yiran</div>
          <p class="team-member__bio" data-i18n="team2_bio">
            中国公認会計士（CPA）。財務戦略・クロスボーダービジネスのアドバイザリーを担当。中日間のビジネス開発および財務管理をサポートします。
          </p>
        </div>

      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
</body>
</html>
