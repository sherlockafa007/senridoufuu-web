[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[edge_functions]
  directory = "netlify/edge-functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/solutions"
  to = "/solutions/"
  status = 301

[[redirects]]
  from = "/solutions/blog"
  to = "/solutions/blog/"
  status = 301
