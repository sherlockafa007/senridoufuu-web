<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません · 千里同風株式会社</title>
  <meta name="robots" content="noindex">
  <!-- Cloudflare Pages：根目录存在 404.html 时，未匹配路径返回本页（404），
       否则会用首页内容兜底且样式错位，看起来像坏页。资源一律绝对路径。 -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', 'Noto Sans SC', system-ui, sans-serif;
      background: #faf9f7; color: #1f1c17;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { text-align: center; max-width: 420px; }
    .logo { font-size: 26px; font-weight: 700; letter-spacing: .12em; margin-bottom: 28px; color: #6b6359; }
    .code { font-size: 56px; font-weight: 300; color: #d6cfc4; margin-bottom: 16px; }
    .msg { font-size: 15px; line-height: 2; color: #6b6359; margin-bottom: 32px; }
    .home {
      display: inline-block; padding: 12px 32px; background: #1f1c17; color: #fff;
      text-decoration: none; border-radius: 999px; font-size: 14px; letter-spacing: .05em;
      transition: opacity .15s;
    }
    .home:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">千里同風</div>
    <div class="code">404</div>
    <p class="msg">
      お探しのページは見つかりませんでした。<br>
      您访问的页面不存在。<br>
      Page not found.
    </p>
    <a class="home" href="/">トップページへ / 回到首页</a>
  </div>
</body>
</html>
