name: Mirror to deploy repo

# Runs in the SOURCE repo (sherlockafa007/senridoufuu-web) on every push to
# main and force-mirrors main into the deploy repo (Eveysnow5/senridf-web).
# The deploy repo's update fires the colleague's Cloudflare Pages build, so a
# push goes live with no manual "Sync fork".
#
# Setup: add a repository secret MIRROR_PAT = a fine-grained PAT scoped to
# Eveysnow5/senridf-web with "Contents: Read and write".
# Until that secret exists the job skips cleanly (no failure, no email).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    if: github.repository == 'sherlockafa007/senridoufuu-web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # don't let GITHUB_TOKEN's extraheader override the PAT
      - name: Force-push main to deploy repo
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          if [ -z "$MIRROR_PAT" ]; then
            echo "MIRROR_PAT not set — skipping mirror (set the secret to enable auto-deploy)."
            exit 0
          fi
          echo "Mirroring $(git rev-parse --short HEAD) to Eveysnow5/senridf-web ..."
          git push --force "https://x-access-token:${MIRROR_PAT}@github.com/Eveysnow5/senridf-web.git" HEAD:main
          echo "Done."
